<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VMRTIN26 — Motor Oil Refineries</title>
<meta name="version" content="1.0.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2535">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VMRTIN26">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="deploy" content="github-pages">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>🔥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  /* ── LIGHT STEEL INDUSTRIAL PALETTE ── */
  --bg:      #dde2e8;   /* ανοιχτό γκρι ατσάλι — φόντο */
  --bg2:     #eef1f4;   /* κάρτες — σχεδόν λευκό ατσάλι */
  --bg3:     #f5f7f9;   /* inputs — πολύ ανοιχτό */
  --bg4:     #c8cfd8;   /* hover/active */
  --border:  #b0bac8;   /* ορατό steel edge */
  --border2: #8a98aa;   /* έντονο edge */

  /* ── TEXT — σκούρο για αντίθεση ── */
  --text:    #1a2030;   /* σχεδόν μαύρο navy */
  --text2:   #3a4a5e;   /* δευτερεύον σκούρο */
  --text3:   #6a7a90;   /* muted */

  /* ── INDUSTRIAL BLUE — primary accent ── */
  --accent:  #1a5fa8;   /* βαθύ βιομηχανικό μπλε */
  --accent2: #2878cc;   /* ανοιχτότερο μπλε */

  /* ── STATUS COLORS ── */
  --blue:    #1a5fa8;
  --blue2:   #2878cc;
  --green:   #1e7a42;   /* safety green */
  --green2:  #28a05a;
  --red:     #c0251e;   /* hazard red */
  --red2:    #e03830;
  --purple:  #5a3a8a;
  --purple2: #7a5aaa;
  --cyan:    #1a7a88;

  --font:  'Rajdhani', sans-serif;
  --mono:  'Share Tech Mono', monospace;
  --cond:  'Oswald', sans-serif;
  --radius:  6px;
  --radius2: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: var(--font);
  background: var(--bg);
  background-image:
    repeating-linear-gradient(
      0deg, transparent, transparent 39px,
      rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px
    ),
    repeating-linear-gradient(
      90deg, transparent, transparent 79px,
      rgba(0,0,0,0.02) 79px, rgba(0,0,0,0.02) 80px
    );
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  letter-spacing: 0.2px;
}

/* ── LOGIN ── */
#login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  background:
    linear-gradient(160deg, #c8d0da 0%, #dde2e8 60%, #d0d8e4 100%);
}

.login-card {
  width: 100%;
  max-width: 360px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-top: 3px solid var(--accent);
  border-radius: var(--radius2);
  padding: 32px 28px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15), 0 2px 8px rgba(26,95,168,0.12);
}

.login-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}

.login-logo .logo-icon {
  width: 38px;
  height: 38px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.login-logo .logo-text {
  font-family: var(--cond);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
  line-height: 1.2;
}

.login-logo .logo-sub {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.login-title {
  font-family: var(--cond);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}

.login-sub {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 24px;
}

.field-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}

.field-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  padding: 10px 12px;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}

.field-input:focus { border-color: var(--accent); }

.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #0f1117;
  border: none;
  border-radius: var(--radius);
  font-family: var(--cond);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 12px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

.btn-primary:active { transform: scale(0.98); }
.btn-primary:hover { background: var(--accent2); }

.login-hint {
  margin-top: 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  font-size: 12px;
  color: var(--text3);
}

.login-hint table { width: 100%; border-collapse: collapse; }
.login-hint td { padding: 3px 0; }
.login-hint td:first-child { color: var(--accent); font-family: var(--mono); font-size: 11px; width: 60px; }
.login-hint .role-badge { 
  font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
  font-family: var(--cond); letter-spacing: 0.3px;
}
.role-admin   { background: #fde8e0; color: #8a2010; border: 1px solid #f0a090; }
.role-super   { background: #fef8e0; color: #7a5800; border: 1px solid #e8d080; }
.role-tech    { background: #e0ecf8; color: #0a3a70; border: 1px solid #90bce0; }
.role-view    { background: #e0f4e8; color: #0a4a20; border: 1px solid #80c8a0; }

.login-error {
  color: var(--red2);
  font-size: 13px;
  text-align: center;
  margin-top: 12px;
  display: none;
}

/* ── APP SHELL ── */
#app { display: none; flex-direction: column; min-height: 100vh; }

.topbar {
  background: #1a2535;
  border-bottom: 2px solid var(--accent);
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.topbar-logo {
  font-family: var(--cond);
  font-size: 17px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.topbar-tag {
  font-family: var(--mono);
  font-size: 11px;
  color: #a0b4cc;
  background: rgba(255,255,255,0.1);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.15);
}

.topbar-tag {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  background: var(--bg3);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.user-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 4px 10px 4px 6px;
  font-size: 12px;
  cursor: pointer;
}

.user-avatar {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--cond);
}

.icon-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius);
  color: #a0b4cc;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: border-color 0.2s, color 0.2s;
}
.icon-btn:hover { border-color: var(--accent2); color: #fff; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #1a2535;
  border-top: 2px solid var(--accent);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -4px 16px rgba(0,0,0,0.2);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px 6px;
  cursor: pointer;
  transition: color 0.2s;
  color: #607080;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  font-family: var(--cond);
  text-transform: uppercase;
  gap: 3px;
  border: none;
  background: none;
}

.nav-item .nav-icon { font-size: 20px; line-height: 1; }
.nav-item.active { color: #60aaee; }
.nav-item.active .nav-icon { filter: drop-shadow(0 0 5px rgba(40,120,204,0.6)); }

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px 6px;
  cursor: pointer;
  transition: color 0.2s;
  color: var(--text3);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  font-family: var(--cond);
  text-transform: uppercase;
  gap: 3px;
  border: none;
  background: none;
}

.nav-item .nav-icon { font-size: 20px; line-height: 1; }
.nav-item.active { color: var(--accent); }
.nav-item.active .nav-icon { filter: drop-shadow(0 0 5px rgba(232,98,26,0.5)); }

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1;
  padding: 16px;
  padding-bottom: 80px;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}

/* ── PAGE HEADERS ── */
.page-header {
  margin-bottom: 20px;
}

.page-title {
  font-family: var(--cond);
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.3px;
}

.page-sub {
  font-size: 13px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── CARDS ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 16px;
  margin-bottom: 12px;
}

.card-title {
  font-family: var(--cond);
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ── KPI GRID ── */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.kpi-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 14px;
  position: relative;
  overflow: hidden;
}

.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}

.kpi-card.amber::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.kpi-card.blue::before  { background: linear-gradient(90deg, #0a3060, var(--blue2)); }
.kpi-card.green::before { background: linear-gradient(90deg, #0a4020, var(--green2)); }
.kpi-card.red::before   { background: linear-gradient(90deg, #6a1010, var(--red2)); }

.kpi-value {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 600;
  line-height: 1;
  margin-bottom: 4px;
}

.kpi-card.amber .kpi-value { color: var(--accent); }
.kpi-card.blue  .kpi-value { color: var(--blue2); }
.kpi-card.green .kpi-value { color: var(--green2); }
.kpi-card.red   .kpi-value { color: var(--red2); }

.kpi-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-family: var(--cond);
}

/* ── SEARCH BAR ── */
.search-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.search-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); font-family: var(--font); }

.qr-btn {
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #0f1117;
  width: 42px;
  height: 42px;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}
.qr-btn:hover { background: var(--accent2); }

/* ── DETECTOR LIST ── */
.detector-item {
  display: flex;
  align-items: center;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  gap: 12px;
}

.detector-item:hover, .detector-item:active {
  border-color: var(--accent);
  background: var(--bg3);
}

.det-tag {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  min-width: 110px;
}

.det-area {
  flex: 1;
  font-size: 12px;
  color: var(--text3);
}

.det-status {
  font-size: 10px;
  font-weight: 600;
  font-family: var(--cond);
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.status-ok     { background: #d0f0dc; color: #0a4a20; border: 1px solid #80c8a0; }
.status-done   { background: #d0e8f8; color: #0a3060; border: 1px solid #80b8e0; }
.status-pending{ background: #fef0d0; color: #6a4000; border: 1px solid #e0b860; }
.status-new    { background: #e8ecf0; color: #6a7a90; border: 1px solid #b0bac8; }

.det-arrow { color: var(--text3); font-size: 16px; }

/* ── FILTER PILLS ── */
.filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 6px;
  margin-bottom: 14px;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-pill {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--cond);
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: all 0.15s;
}
.filter-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0f1117;
}

/* ── DETECTOR DETAIL ── */
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text3);
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 16px;
  background: none;
  border: none;
  padding: 0;
  font-family: var(--font);
}
.back-btn:hover { color: var(--accent); }

.detail-header {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 18px;
  margin-bottom: 14px;
}

.detail-tag {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
}

.detail-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.meta-badge {
  font-size: 11px;
  font-family: var(--cond);
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.3px;
}
.meta-gas  { background: #daeaf8; color: #0a3060; border: 1px solid #90bce0; }
.meta-fire { background: #fde0da; color: #6a1010; border: 1px solid #e09080; }
.meta-area { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.meta-year { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); font-family: var(--mono); }

/* ── HISTORY TABLE ── */
.history-entry {
  border-left: 2px solid var(--border);
  padding: 10px 14px;
  margin-bottom: 8px;
  background: var(--bg2);
  border-radius: 0 var(--radius) var(--radius) 0;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  background: linear-gradient(90deg, rgba(26,95,168,0.06) 0%, transparent 50%);
}

.hist-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 4px;
}

.hist-task {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 3px;
}

.hist-tech {
  font-size: 12px;
  color: var(--text3);
}

.hist-cylinder {
  display: inline-block;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  margin-left: 6px;
}

/* ── ADD ENTRY FORM ── */
.form-group { margin-bottom: 14px; }

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  font-family: var(--cond);
}

.form-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }

/* Multi-select task chips */
.task-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.task-chip {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font);
  display: flex;
  align-items: center;
  gap: 6px;
}

.task-chip.selected {
  background: rgba(26,95,168,0.12);
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: inset 0 0 0 1px rgba(26,95,168,0.2);
}

.task-chip .chip-check { font-size: 14px; }

.altro-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 8px 12px;
  outline: none;
  margin-top: 8px;
  display: none;
  transition: border-color 0.2s;
}
.altro-input:focus { border-color: var(--accent); }
.altro-input.show { display: block; }

/* ── STATS PAGE ── */
.bar-chart-wrap { margin-top: 10px; }

.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.bar-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  min-width: 160px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bar-track {
  flex: 1;
  background: var(--bg3);
  border-radius: 3px;
  height: 8px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

.bar-count {

  'ΕΎΦΛΕΚΤΑ ΑΕΡΙΑ': 4,

};

];

  try {
    const saved = localStorage.getItem('vmrtin26_lists');

      if (p.areas)      DET_AREAS      = p.areas;

      if (p.catIntervals) {
        Object.entries(p.catIntervals).forEach(([k,v]) => { CAL_INTERVALS[k] = v; });
        DET_CATEGORIES = Object.keys(CAL_INTERVALS).filter(k => k !== 'DEFAULT');

};

const GS_URL = 'https://script.google.com/macros/s/AKfycbz2DBRAg6UHAEm1TTsd034HH4WG-jJZvJI_vXeIgd2J8zV1TJdJ2T9hV4nr4N5D_C29cQ/exec';
let gsConnected = false;
let gsSyncing   = false;

async function gsGet(params) {
  // JSONP — μόνος τρόπος για Apps Script από GitHub Pages
  return new Promise((resolve, reject) => {
    const cbName = 'gs_cb_' + Date.now();
    const url = GS_URL + '?' + new URLSearchParams({...params, callback: cbName});
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cbName];
      script.remove();
      reject(new Error('Timeout'));
    }, 15000);
    window[cbName] = (data) => {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      resolve(data);
    };
    script.src = url;
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      reject(new Error('Script load error'));
    };
    document.head.appendChild(script);
  });
}

async function gsPost(data) {
  const res = await fetch(GS_URL, {
    method: 'POST',
    redirect: 'follow',
    mode: 'cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(data),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ── Load all data from Google Sheets ──
async function syncFromSheets() {
  if (gsSyncing) return;
  gsSyncing = true;
  showSyncStatus('⟳ Συγχρονισμός...');

  try {
    // Load detectors
    const detRes = await gsGet({ action: 'getDetectors' });
    if (detRes.detectors && detRes.detectors.length > 0) {
      // Merge with local — remote wins for metadata
      for (const remote of detRes.detectors) {
        let local = DETECTORS.find(d => d.tag === remote.tag);
        if (local) {
          local.description = remote.description || local.description;
          local.location    = remote.location    || local.location;
          local.type        = remote.type        || local.type;
          local.area        = remote.area        || local.area;
          local.category    = remote.category    || local.category;
          local.calInterval = remote.calInterval || local.calInterval;
          local.nextCalDate = remote.nextCalDate || local.nextCalDate;
        } else {
          DETECTORS.push({ ...remote, entries: [] });
        }
      }
    }

    // Load all entries
    const entRes = await gsGet({ action: 'getAllEntries' });
    if (entRes.entries && entRes.entries.length > 0) {
      // Clear demo entries and replace with real data
      DETECTORS.forEach(d => d.entries = []);
      for (const e of entRes.entries) {
        const det = DETECTORS.find(d => d.tag === e.tag);
        if (det) {
          det.entries.push({
            date:     e.date,
            task:     e.task,
            cylinder: e.cylinder,
            tech:     e.tech,
            notes:    e.notes,
          });
        }
      }
      // Sort entries by date
      DETECTORS.forEach(d => d.entries.sort((a,b) => a.date.localeCompare(b.date)));
    }

    // Load users — Sheet είναι η αλήθεια
    // Αφαιρούμε όλους πλην admin και τους ξαναφτιάχνουμε από το Sheet
    const usrRes = await gsGet({ action: 'getUsers' });
    if (usrRes.users && usrRes.users.length > 0) {
      // Κράτα μόνο τον admin τοπικά
      const adminUser = USERS['admin'];
      Object.keys(USERS).forEach(k => { if (k !== 'admin') delete USERS[k]; });
      // Φόρτωσε ΟΛΑ από Sheet (συμπεριλαμβανομένου admin αν υπάρχει)
      for (const u of usrRes.users) {
        if (!u.username) continue;
        USERS[u.username] = {
          passHash: u.passHash || (u.username === 'admin' && adminUser ? adminUser.passHash : ''),
          role:     u.role     || 'readonly',
          name:     u.name     || u.username,
          dept:     u.dept     || '',
        };
      }
      // Αν ο admin δεν είναι στο Sheet, κράτα τον τοπικό
      if (!USERS['admin'] && adminUser) USERS['admin'] = adminUser;
    }

    // Load cylinders — merge: Sheet κερδίζει για υπάρχοντα, τοπικά unsent προστίθενται
    const cylRes = await gsGet({ action: 'getCylinders' });
    if (cylRes.cylinders) {
      if (cylRes.cylinders.length > 0) {
        // Κράτα τοπικές φιάλες που ΔΕΝ υπάρχουν στο Sheet (δεν πρόλαβαν να σταλούν)
        const sheetIds = new Set(cylRes.cylinders.map(c => c.id));
        const localOnly = CYLINDERS.filter(c => !sheetIds.has(c.id));
        CYLINDERS.length = 0;
        cylRes.cylinders.forEach(c => CYLINDERS.push(c));
        // Πρόσθεσε τοπικές φιάλες που δεν στάλθηκαν ακόμα
        localOnly.forEach(c => CYLINDERS.push(c));
        saveCylinders();
        // Στείλε τις unsent στο Sheet
        localOnly.forEach(c => gsSaveCylinder(c));
      } else if (CYLINDERS.length > 0) {
        // Sheet άδειο αλλά τοπικά υπάρχουν φιάλες → στείλε τις όλες
        CYLINDERS.forEach(c => gsSaveCylinder(c));
      }
    }

    gsConnected = true;
    showSyncStatus('✓ Συνδεδεμένο', 'ok');
    if (currentPage) showPage(currentPage);

  } catch(err) {
    console.error('Sync error:', err);
    gsConnected = false;
    showSyncStatus('✗ Offline', 'err');
  } finally {
    gsSyncing = false;
  }
}

// DATE HELPERS
// ══════════════════════════════════════════
function getIntervalMonths(det) {
  if (det.calInterval) return det.calInterval;
  return CAL_INTERVALS[det.category] || CAL_INTERVALS['DEFAULT'];
}

function getLastCalDate(det) {
  if (!det.entries.length) return null;
  const normalize = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const sorted = det.entries
    .filter(e => normalize(e.task).includes('βαθμονομηση') || normalize(e.task).includes('calib'))
    .sort((a,b) => b.date.localeCompare(a.date));
  if (sorted.length) return sorted[0].date;
  // fallback: most recent entry
  return det.entries.slice().sort((a,b) => b.date.localeCompare(a.date))[0].date;
}

function getNextCalDate(det) {
  if (det.nextCalDate) return det.nextCalDate; // manually set
  const last = getLastCalDate(det);
  if (!last) return null;
  const d = new Date(last);
  d.setMonth(d.getMonth() + getIntervalMonths(det));
  return d.toISOString().split('T')[0];
}

function getAlertStatus(det) {
  const next = getNextCalDate(det);
  if (!next) return 'none';
  const today = new Date();
  const nextD = new Date(next);
  const diffDays = Math.round((nextD - today) / 86400000);
  if (diffDays < 0)  return 'overdue';
  if (diffDays <= 30) return 'soon';
  return 'ok';
}

function getDaysUntil(dateStr) {
  if (!dateStr) return null;
  return Math.round((new Date(dateStr) - new Date()) / 86400000);
}

// Μήνες σε 3-γράμματη αγγλική μορφή, όπως τους παράγει το JS Date.toString()
// (π.χ. 'Wed Apr 19 2028...') — χρησιμοποιείται από parseDateParts().
const MONTH3_TO_NUM = { Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12 };

// Κοινός, timezone-safe parser ημερομηνίας. Επιστρέφει {day, month, year} (αριθμοί)
// ή null αν δεν αναγνωρίζεται. Χρησιμοποιείται ΚΑΙ από formatDate() ΚΑΙ από
// isExpired(), ώστε εμφάνιση και σύγκριση λήξης να συμφωνούν πάντα μεταξύ τους.
// Καλύπτει: ISO yyyy-mm-dd, ήδη DD/MM/YYYY, πλήρες JS Date.toString() (η μορφή
// που επιστρέφει το Google Sheets όταν μετατρέπει αυτόματα κείμενο σε ημερομηνία),
// και γενικό fallback μέσω new Date() μόνο όταν δεν δηλώνεται ζώνη ώρας.
function parseDateParts(dateStr) {
  if (!dateStr) return null;
  const s = String(dateStr).trim();

  // (1) ISO yyyy-mm-dd (με ή χωρίς ώρα/Z)
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return { year: +m[1], month: +m[2], day: +m[3] };

  // (2) Ήδη DD/MM/YYYY ή D/M/YYYY
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return { year: +m[3], month: +m[2], day: +m[1] };

  // (3) Πλήρες JS Date.toString(), π.χ. 'Wed Apr 19 2028 00:00:00 GMT+0300 (...)'.
  //     Διαβάζουμε μήνα/μέρα/έτος απευθείας από το αναγνώσιμο μέρος, αγνοώντας
  //     ώρα/ζώνη — καμία πιθανότητα ολίσθησης ημέρας.
  m = s.match(/^\w{3}\s+(\w{3})\s+(\d{1,2})\s+(\d{4})/);
  if (m && MONTH3_TO_NUM[m[1]]) {
    return { year: +m[3], month: MONTH3_TO_NUM[m[1]], day: +m[2] };
  }

  // (4) Γενικό fallback: new Date() ΜΟΝΟ όταν δεν υπάρχει δηλωμένη ζώνη ώρας
  //     στο string (οπότε δεν τίθεται θέμα shift).
  if (!/GMT|UTC|[+-]\d{2}:?\d{2}/.test(s)) {
    const d = new Date(s);
    if (!isNaN(d.getTime())) {
      return { year: d.getFullYear(), month: d.getMonth() + 1, day: d.getDate() };
    }
  }

  return null; // μη αναγνωρίσιμο/ασαφές (π.χ. 'Sep 2027', 'F5F5')
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const parts = parseDateParts(dateStr);
  if (!parts) return String(dateStr).trim(); // εμφάνισέ το ως έχει, μην το σπάσεις σε NaN
  return String(parts.day).padStart(2,'0') + '/' + String(parts.month).padStart(2,'0') + '/' + parts.year;
}

// ── DD/MM/YYYY date-mask input widget ──
// Αντικαθιστά native <input type="date"> (που εμφανίζεται με τη μορφή locale του
// browser/OS — π.χ. MM/DD/YYYY — ανεξάρτητα από τον κώδικά μας) με ένα ζευγάρι:
//  • ορατό <input type="text"> πάντα σε DD/MM/YYYY, με αυτόματο "/" ενώ πληκτρολογείς
//  • κρυφό <input type="date"> που κρατά την πραγματική τιμή σε ISO yyyy-mm-dd και
//    συνεχίζει να καλεί το ΙΔΙΟ onchange handler που θα καλούσε το native input,
//    ώστε caller-side κώδικας (π.χ. setDetNextDate) να μη χρειάζεται καμία αλλαγή.
// Κλικ στο ορατό text input ανοίγει το native ημερολόγιο του κρυφού date input.
function dateMaskInputHTML(id, isoValue, onchangeJs, extraStyle) {
  const display = isoValue ? formatDate(isoValue) : '';
  const safeDisplay = display === '—' ? '' : display;
  return `<input type="text" inputmode="numeric" id="${id}" class="date-mask-input"
      placeholder="ΗΗ/ΜΜ/ΕΕΕΕ" maxlength="10" value="${safeDisplay}"
      style="${extraStyle||''}"
      oninput="_dateMaskOnInput(this)"
      onclick="document.getElementById('${id}__hidden').showPicker ? document.getElementById('${id}__hidden').showPicker() : document.getElementById('${id}__hidden').focus()">
    <input type="date" id="${id}__hidden" value="${isoValue||''}" style="display:none"
      onchange="document.getElementById('${id}').value = this.value ? formatDate(this.value) : ''; (${onchangeJs})(this.value)">`;
}

// Καθαρίζει/μορφοποιεί το text input ενώ ο χρήστης πληκτρολογεί, προσθέτοντας
// αυτόματα "/" στις σωστές θέσεις, και ενημερώνει το ζευγαρωμένο κρυφό date input
// (άρα και τον caller's onchange) μόνο όταν η ημερομηνία είναι πλήρης και έγκυρη.
function _dateMaskOnInput(el) {
  let digits = el.value.replace(/\D/g,'').slice(0,8);
  let out = digits;
  if (digits.length > 4) out = digits.slice(0,2) + '/' + digits.slice(2,4) + '/' + digits.slice(4);
  else if (digits.length > 2) out = digits.slice(0,2) + '/' + digits.slice(2);
  el.value = out;

  if (digits.length === 8) {
    const day = +digits.slice(0,2), month = +digits.slice(2,4), year = +digits.slice(4,8);
    const d = new Date(year, month - 1, day);
    const valid = d.getFullYear() === year && d.getMonth() === month - 1 && d.getDate() === day;
    const hidden = document.getElementById(el.id + '__hidden');
    if (valid && hidden) {
      const iso = year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
      hidden.value = iso;
      hidden.dispatchEvent(new Event('change'));
    }
  }
}

// ══════════════════════════════════════════
// EXCEL IMPORT (via SheetJS)
// ══════════════════════════════════════════
let sheetJsLoaded = false;

function loadSheetJS(cb) {
  if (sheetJsLoaded) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = () => { sheetJsLoaded = true; cb(); };
  s.onerror = () => showToast('Σφάλμα φόρτωσης βιβλιοθήκης', 'error');
  document.head.appendChild(s);
}

function triggerImport() {
  document.getElementById('excel-file-input').click();
}

function handleFileImport(input) {
  const file = input.files[0];
  if (!file) return;
  loadSheetJS(() => {
    const reader = new FileReader();
    reader.onload = e => parseExcelFile(e.target.result, file.name);
    reader.readAsArrayBuffer(file);
  });
  input.value = ''; // reset so same file can be re-imported
}

function parseExcelFile(buffer, filename) {
  try {
    showToast('⟳ Ανάγνωση αρχείου...', 'info');
    const wb = XLSX.read(buffer, { type: 'array', cellDates: true });

    let imported = 0, updated = 0, entryCount = 0;
    const SKIP_SHEETS = new Set(['INDEX','Sheet1','Sheet2','Sheet3','Φύλλο1','Φύλλο2','Φύλλο3','LEGEND','README','SUMMARY','VBA','NOTES']);
    const sheetNames = wb.SheetNames.filter(n => !SKIP_SHEETS.has(n.trim()));

    // ── Read INDEX for metadata (Row 3 = headers, Row 4+ = data) ──
    const indexData = {};
    if (wb.SheetNames.includes('INDEX')) {
      const ix = XLSX.utils.sheet_to_json(wb.Sheets['INDEX'], { header:1, defval:null });
      // Row index 2 = headers, Row index 3+ = data
      for (let r = 3; r < ix.length; r++) {
        const row = ix[r];
        if (!row || !row[1]) continue;
        const tag = String(row[1]).trim();
        if (!tag || tag === 'DETECTOR TAG') continue;
        indexData[tag] = {
          category:    row[0] ? String(row[0]).trim() : '',
          location:    row[2] ? String(row[2]).trim() : '',
          latestDate:  row[3] ? excelDateToStr(row[3]) : null,
          nextCalDate: row[4] ? excelDateToStr(row[4]) : null,
        };
      }
    }

    // ── Process each detector sheet ──
    for (const sheetName of sheetNames) {
      const tag = sheetName.trim();
      const ws  = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null, raw:false });

      // Row 3 (index 2) = ΠΕΡΙΓΡΑΦΗ / LOCATION
      // Row 4 (index 3) = ΤΥΠΟΣ (manufacturer)
      const description = rows[2] && rows[2][1] ? String(rows[2][1]).trim() : '';
      const typeVal     = rows[3] && rows[3][1] ? String(rows[3][1]).trim() : '';

      // Row 9 (index 8) = column headers
      // Detect column order from header row
      const headerRow = rows[8] || [];
      let colDate = 0, colTask = 1, colCyl = 2, colTech = 3, colNotes = 4;
      headerRow.forEach((h, i) => {
        if (!h) return;
        const hs = String(h).toUpperCase();
        if (hs.includes('ΗΜΕΡ') || hs.includes('DATE'))                             colDate  = i;
        if ((hs.includes('ΕΡΓΑΣ') || hs.includes('TASK')) && !hs.includes('ΤΥΠΟΣ')) colTask  = i;
        if (hs.includes('ΦΙΑΛ') || hs.includes('CYL'))                             colCyl   = i;
        if (hs.includes('ΤΕΧΝ') || hs.includes('TECH') || hs.includes('NAME'))     colTech  = i;
        if (hs.includes('ΣΗΜΕ') || hs.includes('NOTE') || hs.includes('ΤΥΠΟΣ'))    colNotes = i;
      });

      // Parse entries from row 10+ (index 9)
      const entries = [];
      for (let r = 9; r < rows.length; r++) {
        const row = rows[r];
        if (!row || !row[colDate]) continue;
        const dateStr = excelDateToStr(row[colDate]);
        if (!dateStr) continue;

        // Handle NNC format: col2=tech, no cylinder
        const remarksVal = row[colTask]  ? String(row[colTask]).trim()  : ''; // ΕΡΓΑΣΙΑ/ΠΑΡΑΤΗΡΗΣΕΙΣ
        const cylVal     = row[colCyl]   ? String(row[colCyl]).trim()   : '';
        const techVal    = row[colTech]  ? String(row[colTech]).trim()  : '';
        const typeVal2   = row[colNotes] ? String(row[colNotes]).trim() : ''; // ΤΥΠΟΣ ΕΡΓΑΣΙΑΣ

        // Skip if cylinder value looks like a technician name (NNC has no cylinder col)
        const isCylNum = cylVal && /^\d+$/.test(cylVal.replace(/[^\d]/g,'').slice(0,4));
        const finalCyl  = isCylNum ? cylVal : '';
        const finalTech = isCylNum ? techVal : (cylVal || techVal);

        // ΤΥΠΟΣ ΕΡΓΑΣΙΑΣ χρησιμοποιείται ως task αν η ΕΡΓΑΣΙΑ/ΠΑΡΑΤΗΡΗΣΕΙΣ είναι κενή
        const taskVal = remarksVal || typeVal2;
        // ΠΑΡΑΤΗΡΗΣΕΙΣ = ΕΡΓΑΣΙΑ/ΠΑΡΑΤΗΡΗΣΕΙΣ μόνο αν διαφέρει από τον τύπο
        const notesVal = (remarksVal && remarksVal !== typeVal2) ? remarksVal : '';

        if (!finalTech && !taskVal && !cylVal) continue; // skip εντελώς κενές γραμμές

        entries.push({ date: dateStr, task: taskVal, cylinder: finalCyl, tech: finalTech, notes: notesVal });
      }

      // ── Smart merge ──
      let det = DETECTORS.find(d => d.tag === tag);
      const meta = indexData[tag] || {};

      if (det) {
        let changed = false;
        // Ενημερώνει metadata ΜΟΝΟ αν άλλαξε
        if (meta.category    && meta.category    !== det.category)    { det.category    = meta.category;    changed = true; }
        if (meta.location    && meta.location    !== det.location)    { det.location    = meta.location;    changed = true; }
        if (meta.nextCalDate && meta.nextCalDate !== det.nextCalDate) { det.nextCalDate = meta.nextCalDate; changed = true; }
        if (description      && description      !== det.description) { det.description = description;      changed = true; }

        // Προσθέτει ΜΟΝΟ νέες εγγραφές (key = date+tech — αρκεί για μοναδικότητα)
        const existingKeys = new Set(det.entries.map(e => e.date + '|' + (e.tech||'')));
        for (const e of entries) {
          const key = e.date + '|' + (e.tech||'');
          if (!existingKeys.has(key)) {
            det.entries.push(e);
            existingKeys.add(key);
            entryCount++;
            changed = true;
          }
        }
        if (changed) { det._updated = true; updated++; }
      } else {
        det = {
          tag,
          description,
          manufacturer: typeVal,
          location:     meta.location    || '',
          area:         getArea(tag),
          type:         'GAS',
          category:     meta.category    || 'ΕΎΦΛΕΚΤΑ ΑΕΡΙΑ',
          calInterval:  null,
          nextCalDate:  meta.nextCalDate  || null,
          entries,
        };
        det._imported = true;
        DETECTORS.push(det);
        entryCount += entries.length;
        imported++;
      }
    }

    // Sort entries by date
    DETECTORS.forEach(d => d.entries.sort((a,b) => a.date.localeCompare(b.date)));

    // Save to localStorage για persistence
    saveDetectors();

    // Push to Google Sheets if connected
    // Στέλνουμε ΟΛΟΥΣ (νέους + ενημερωμένους) — το Sheet κάνει upsert
    if (gsConnected) {
      const allChanged = DETECTORS.filter(d => d._imported || d._updated);
      if (allChanged.length > 0) {
        gsPost({ action: 'importDetectors', data: allChanged.map(d => ({
          tag: d.tag, description: d.description||'', location: d.location||'',
          type: d.type||'GAS', area: d.area||'', category: d.category||'',
          calInterval: d.calInterval||'', nextCalDate: d.nextCalDate||'',
          entries: (d.entries||[]).map(e => ({
            date: e.date, task: e.task||'', cylinder: e.cylinder||'',
            tech: e.tech||'', notes: e.notes||''
          }))
        }))}).catch(()=>{});
        allChanged.forEach(d => { delete d._imported; delete d._updated; });
      }
    }

    showToast(`✓ ${filename}: ${imported} νέοι · ${updated} ενημερώθηκαν · ${entryCount} εγγραφές`);
    if (currentPage) showPage(currentPage);

  } catch(err) {
    console.error('Import error:', err);
    showToast('Σφάλμα import: ' + err.message, 'error');
  }
}

function excelDateToStr(val) {
  if (!val) return null;
  if (val instanceof Date) {
    const y = val.getFullYear();
    const m = String(val.getMonth()+1).padStart(2,'0');
    const d = String(val.getDate()).padStart(2,'0');
    if (y < 1950 || y > 2100) return null;
    return `${y}-${m}-${d}`;
  }
  if (typeof val === 'string') {
    const ddmm = val.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if (ddmm) return `${ddmm[3]}-${ddmm[2].padStart(2,'0')}-${ddmm[1].padStart(2,'0')}`;
    const iso = val.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
  }
  return null;
}

function exportCSVForSheets(type) {
  const BOM = '\uFEFF';
  let csv = '', filename = '';

  if (type === 'detectors') {
    // DETECTORS tab
    const headers = ['TAG','DESCRIPTION','LOCATION','TYPE','AREA','CATEGORY','CAL_INTERVAL','NEXT_CAL_DATE'];
    const rows = DETECTORS.map(d => [
      d.tag,
      `"${(d.description||'').replace(/"/g,'""')}"`,
      `"${(d.location||'').replace(/"/g,'""')}"`,
      d.type || 'GAS',
      d.area || '',
      d.category || '',
      d.calInterval || '',
      d.nextCalDate || '',
    ]);
    csv = BOM + [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
    filename = 'VMRTIN26_DETECTORS.csv';
    showToast(`✓ ${DETECTORS.length} ανιχνευτές εξήχθησαν`);

  } else if (type === 'entries') {
    // ENTRIES tab
    const headers = ['TAG','DATE','TASK','CYLINDER','TECHNICIAN','NOTES','TIMESTAMP'];
    const rows = [];
    DETECTORS.forEach(d => {
      d.entries.forEach(e => {
        rows.push([
          d.tag,
          e.date,
          `"${(e.task||'').replace(/"/g,'""')}"`,
          `"${(e.cylinder||'').replace(/"/g,'""')}"`,
          `"${(e.tech||'').replace(/"/g,'""')}"`,
          `"${(e.notes||'').replace(/"/g,'""')}"`,
          new Date().toISOString(),
        ]);
      });
    });
    csv = BOM + [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
    filename = 'VMRTIN26_ENTRIES.csv';
    showToast(`✓ ${rows.length} εγγραφές εξήχθησαν`);
  }

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════
// AUTH — SHA-256 HASHED PASSWORDS
// ══════════════════════════════════════════

// Passwords stored as SHA-256 hashes — never plain text
// Default hash = SHA-256 of username (admin→admin, tech1→tech1 etc.)
// Change passwords from Admin panel or user settings
// To generate a new hash: hashPassword('newpassword').then(h => console.log(h))

// ══════════════════════════════════════════
// SHA-256 — δουλεύει και από file://
// ══════════════════════════════════════════
async function hashPassword(password) {
  // Try crypto.subtle (https://)
  if (window.crypto && window.crypto.subtle && window.location.protocol !== 'file:') {
    const buf  = new TextEncoder().encode(password);
    const hash = await window.crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  // Fallback: pure JS SHA-256 για file://
  return sha256(password);
}

// Pure JS SHA-256 (για file://)
function sha256(str) {
  function rightRotate(value, amount) {
    return (value >>> amount) | (value << (32 - amount));
  }
  const mathPow = Math.pow;
  const maxWord = mathPow(2, 32);
  let result = '';
  const words = [];
  const asciiBitLength = str.length * 8;
  let hash = [];
  let k = [];
  let primeCounter = 0;
  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (let i = candidate * candidate; i < 313; i += candidate) isComposite[i] = true;
      hash[primeCounter] = (mathPow(candidate, 0.5) * maxWord) | 0;
      k[primeCounter++]  = (mathPow(candidate, 1/3) * maxWord) | 0;
    }
  }
  str += '\x80';
  while (str.length % 64 - 56) str += '\x00';
  for (let i = 0; i < str.length; i++) {
    const j = str.charCodeAt(i);
    if (j >> 8) return ''; // non-ASCII
    words[i >> 2] |= j << ((3 - i) % 4) * 8;
  }
  words[words.length] = ((asciiBitLength / maxWord) | 0);
  words[words.length] = (asciiBitLength | 0);
  for (let j = 0; j < words.length;) {
    const w = words.slice(j, j += 16);
    const oldHash = [...hash];
    for (let i = 0; i < 64; i++) {
      const w15 = w[i-15], w2 = w[i-2];
      const a = hash[0], e = hash[4];
      const temp1 = hash[7]
        + (rightRotate(e,6) ^ rightRotate(e,11) ^ rightRotate(e,25))
        + ((e & hash[5]) ^ (~e & hash[6]))
        + k[i]
        + (w[i] = (i < 16) ? w[i] : (
            w[i-16]
            + (rightRotate(w15,7) ^ rightRotate(w15,18) ^ (w15>>>3))
            + w[i-7]
            + (rightRotate(w2,17) ^ rightRotate(w2,19) ^ (w2>>>10))
          ) | 0);
      const temp2 = (rightRotate(a,2) ^ rightRotate(a,13) ^ rightRotate(a,22))
        + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
      hash = [(temp1+temp2)|0,...hash];
      hash[4] = (hash[4]+temp1)|0;
      hash.length = 8;
    }
    hash = hash.map((v,i) => (v+oldHash[i])|0);
  }
  hash.forEach(v => {
    for (let i = 7; i >= 0; i--) result += ((v>>>(i*4)) & 0xf).toString(16);
  });
  return result;
}

// Load saved passwords from localStorage (override defaults)
function loadSavedPasswords() {
  try {
    const saved = localStorage.getItem('vmrtin26_passwords');
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.entries(parsed).forEach(([u, hash]) => {
        if (USERS[u]) USERS[u].passHash = hash;
      });
    }
  } catch(e) {}
}

function savePasswordHash(username, hash) {
  try {
    const saved = JSON.parse(localStorage.getItem('vmrtin26_passwords') || '{}');
    saved[username] = hash;
    localStorage.setItem('vmrtin26_passwords', JSON.stringify(saved));
  } catch(e) {}
  // Also save to Google Sheets
  gsSavePassword(username, hash);
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const inputHash = await hashPassword(p);

  // Πρώτα έλεγξε τοπικά (hardcoded + localStorage)
  let user = USERS[u];
  if (user && inputHash === user.passHash) {
    loginSuccess(u, user);
    return;
  }

  // Αν δεν βρέθηκε τοπικά ή λάθος κωδικός — ρώτα το Sheet
  if (gsConnected || GS_URL) {
    const btn = document.getElementById('l-btn');
    if (btn) { btn.textContent = '...'; btn.disabled = true; }
    try {
      const res = await gsGet({ action: 'getUsers' });
      if (res && res.users) {
        res.users.forEach(su => {
          USERS[su.username] = {
            passHash: su.passHash,
            role:     su.role     || 'readonly',
            name:     su.name     || su.username,
            dept:     su.dept     || '',
          };
        });
      }
      user = USERS[u];
      if (user && inputHash === user.passHash) {
        loginSuccess(u, user);
        return;
      }
    } catch(e) {}
    finally {
      if (btn) { btn.textContent = 'ΕΙΣΟΔΟΣ'; btn.disabled = false; }
    }
  }

  showLoginError();
}

async function doChangePassword(targetUser, requireOld) {
  const newPass    = document.getElementById('cp-new')?.value || '';
  const confirmPass = document.getElementById('cp-confirm')?.value || '';
  const oldPass    = document.getElementById('cp-old')?.value || '';
  const errEl = document.getElementById('cp-error');

  if (newPass.length < 4) {
    errEl.textContent = 'Ο κωδικός πρέπει να έχει τουλάχιστον 4 χαρακτήρες'; errEl.style.display='block'; return;
  }
  if (newPass !== confirmPass) {
    errEl.textContent = 'Οι κωδικοί δεν ταιριάζουν'; errEl.style.display='block'; return;
  }

  // Verify old password if required
  if (requireOld === 'true') {
    const oldHash = await hashPassword(oldPass);
    if (oldHash !== USERS[targetUser].passHash) {
      errEl.textContent = 'Λάθος τρέχων κωδικός'; errEl.style.display='block'; return;
    }
  }

  const newHash = await hashPassword(newPass);
  USERS[targetUser].passHash = newHash;
  if (gsConnected) {
    gsPost({ action: 'updatePassword', data: {
      username: targetUser, passHash: newHash
    }}).catch(()=>{});
  }
  savePasswordHash(targetUser, newHash);
  document.getElementById('chpass-overlay').remove();
  showToast(`✓ Ο κωδικός του ${targetUser} άλλαξε`);
}

// ══ DASHBOARD ══
function renderDashboard(mc) {
  const total = DETECTORS.length;
  const withEntries = DETECTORS.filter(d => d.entries.length > 0).length;
  const repCount = DETECTORS.reduce((s,d) => s + d.entries.filter(e => e.task.includes('Αλλαγή')).length, 0);

  const overdue = DETECTORS.filter(d => getAlertStatus(d) === 'overdue').length;
  const soon    = DETECTORS.filter(d => getAlertStatus(d) === 'soon').length;
  const okCount = DETECTORS.filter(d => getAlertStatus(d) === 'ok').length;
  const noData  = DETECTORS.filter(d => getAlertStatus(d) === 'none').length;
  // Upcoming this month & next month
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear  = now.getFullYear();
  const upcomingThisMonth = DETECTORS.filter(d => {
    const nd = getNextCalDate(d);
    if (!nd) return false;
    const dd = new Date(nd);
    return dd.getFullYear() === thisYear && dd.getMonth() === thisMonth;
  });
  const upcomingNextMonth = DETECTORS.filter(d => {
    const nd = getNextCalDate(d);
    if (!nd) return false;
    const dd = new Date(nd);
    const nm = (thisMonth + 1) % 12;
    const ny = thisMonth === 11 ? thisYear + 1 : thisYear;
    return dd.getFullYear() === ny && dd.getMonth() === nm;
  });

  const recentEntries = [];
  DETECTORS.forEach(d => d.entries.forEach(e => recentEntries.push({...e, tag: d.tag})));
  recentEntries.sort((a,b) => b.date.localeCompare(a.date));
  const recent = recentEntries.slice(0, 5);

  const areaStats = {};
  DETECTORS.forEach(d => {
    if (!areaStats[d.area]) areaStats[d.area] = {total:0, done:0};

  const monthNames = ['Ιαν','Φεβ','Μαρ','Απρ','Μαι','Ιουν','Ιουλ','Αυγ','Σεπ','Οκτ','Νοε','Δεκ'];

  mc.innerHTML = `

      <div class="page-sub">${t('dash-sub')} · ${new Date().toLocaleDateString('el-GR')}</div>

      </div>
      <div onclick="showKpiList('overdue')" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:10px;border-top:3px solid var(--red);cursor:pointer">
        <div style="font-family:var(--mono);font-size:22px;color:var(--red2)">${overdue}</div>
        <div style="font-size:10px;color:var(--text3);font-family:var(--cond);font-weight:600;letter-spacing:0.5px">ΛΗΓΜΕΝΟΙ</div>
        <div style="font-size:9px;color:var(--red2);font-family:var(--cond);margin-top:3px">▶ ΔΕΣ ΛΗΓΜΕΝΟΥΣ</div>
      </div>
      <div onclick="showKpiList('soon')" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:10px;border-top:3px solid var(--accent);cursor:pointer">
        <div style="font-family:var(--mono);font-size:22px;color:var(--accent2)">${soon}</div>
        <div style="font-size:10px;color:var(--text3);font-family:var(--cond);font-weight:600;letter-spacing:0.5px">≤30 ΜΕΡΕΣ</div>
        <div style="font-size:9px;color:var(--accent2);font-family:var(--cond);margin-top:3px">▶ ΔΕΣ ΛΙΣΤΑ</div>
      </div>
      <div onclick="showKpiList('ok')" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:10px;border-top:3px solid var(--green);cursor:pointer">
        <div style="font-family:var(--mono);font-size:22px;color:var(--green2)">${okCount}</div>
        <div style="font-size:10px;color:var(--text3);font-family:var(--cond);font-weight:600;letter-spacing:0.5px">ΕΝΤΟΣ</div>
        <div style="font-size:9px;color:var(--green2);font-family:var(--cond);margin-top:3px">▶ ΔΕΣ ΛΙΣΤΑ</div>
      </div>
    </div>

    ${upcomingThisMonth.length ? `
    <div class="card" style="border-color:var(--accent);border-left:3px solid var(--accent)">
      <div class="card-title" style="color:var(--accent)">⚠ ΑΥΤΟΝ ΤΟΝ ΜΗΝΑ — ${monthNames[thisMonth].toUpperCase()} ${thisYear} (${upcomingThisMonth.length})</div>
      ${upcomingThisMonth.slice(0,8).map(d => {
        const nd = getNextCalDate(d);
        const days = getDaysUntil(nd);
        const status = getAlertStatus(d);
        return `
        <div class="detector-item" onclick="openDetector('${d.tag}')" style="padding:8px 12px">
          <div>
            <div class="det-tag">${d.tag}</div>
            <div class="det-area">${d.location || d.area}</div>

            <div style="font-size:10px;color:var(--text3)">${days < 0 ? Math.abs(days)+' μέρες πριν' : days === 0 ? 'ΣΗΜΕΡΑ' : days+' μέρες'}</div>

// ══ DETECTORS ══
let filterArea = 'all';
let searchQ = '';

function renderDetectors(mc) {
  const areas = ['all', ...new Set(DETECTORS.map(d => d.area))];
  const filtered = DETECTORS.filter(d => {
    const areaOk = filterArea === 'all' || d.area === filterArea;
    const searchOk = !searchQ || d.tag.toLowerCase().includes(searchQ.toLowerCase());
    return areaOk && searchOk;
  });

  mc.innerHTML = `
    <div class="page-header">
      <div class="page-title">${t('det-title')}</div>
      <div class="page-sub">${t('det-sub')} · ${filtered.length} ανιχνευτές</div>
    </div>
    <div class="search-wrap">
      <input type="text" class="search-input" placeholder="${t('search-ph')}" value="${searchQ}" id="search-input" oninput="searchQ=this.value;renderDetectors(document.getElementById('main-content'))">
      <button class="qr-btn" onclick="openQR('detectors')" title="QR Scan">📷</button>
    </div>
    <div class="filter-row">
      ${areas.map(a => `<div class="filter-pill ${filterArea===a?'active':''}" onclick="filterArea='${a}';renderDetectors(document.getElementById('main-content'))">${a==='all'?t('all'):a}</div>`).join('')}
    </div>
    <div id="det-list">
      ${filtered.map(d => {
        const status = getAlertStatus(d);
        const nextDate = getNextCalDate(d);
        const days = getDaysUntil(nextDate);
        const alertClass = status === 'overdue' ? 'alert-overdue' : status === 'soon' ? 'alert-soon' : status === 'ok' ? 'alert-ok' : 'alert-none';
        const alertLabel = status === 'overdue' ? `${Math.abs(days)}μ πριν` : status === 'soon' ? `${days}μ` : status === 'ok' ? '✓' : '—';
        return `
          <div class="detector-item" onclick="openDetector('${d.tag}')">
            <div style="flex:1;min-width:0">
              <div class="det-tag">${d.tag}</div>
              <div class="det-area">${d.location || d.area} · ${d.entries.length} εγγρ.</div>
            </div>
            <div style="text-align:right;margin-right:8px">
              ${nextDate ? `<div style="font-family:var(--mono);font-size:10px;color:var(--text3)">${formatDate(nextDate)}</div>` : ''}
            </div>
            <span class="det-status ${alertClass}">${alertLabel}</span>
            <span class="det-arrow">›</span>
          </div>
        `;
      }).join('')}
      ${filtered.length === 0 ? `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Δεν βρέθηκαν αποτελέσματα</div></div>` : ''}
    </div>
  `;
}

function openDetector(tag) {
  selectedDetector = DETECTORS.find(d => d.tag === tag);
  showPage('detector-detail');
}

function renderDetectorDetail(mc) {
  const d = selectedDetector;
  if (!d) { showPage('detectors'); return; }

  const status = getAlertStatus(d);
  const nextDate = getNextCalDate(d);
  const days = getDaysUntil(nextDate);
  const lastCal = getLastCalDate(d);
  const interval = getIntervalMonths(d);

  const alertColor = status === 'overdue' ? 'var(--red2)' : status === 'soon' ? 'var(--accent2)' : status === 'ok' ? 'var(--green2)' : 'var(--text3)';
  const alertText  = status === 'overdue' ? `⚠ ΛΗΓΜΕΝΟ κατά ${Math.abs(days)} μέρες` :
                     status === 'soon'    ? `⏰ Σε ${days} μέρες` :

        <button onclick="startEditLocation('${d.tag}')" title="Επεξεργασία τοποθεσίας"
          style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--text3);padding:0 2px">✏️</button>
      </div>
      <div style="display:none;align-items:center;gap:6px;margin:6px 0 2px 0" id="loc-edit-${d.tag}">

          style="font-size:13px;font-family:var(--mono);padding:4px 8px;border:1px solid var(--accent);border-radius:6px;background:var(--bg3);color:var(--text1);width:180px"
          onkeydown="if(event.key==='Enter')saveLocation('${d.tag}');if(event.key==='Escape')cancelEditLocation('${d.tag}')">
        <button onclick="saveLocation('${d.tag}')" style="background:var(--green);color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-family:var(--cond);font-weight:700">✓</button>
        <button onclick="cancelEditLocation('${d.tag}')" style="background:var(--bg4);color:var(--text2);border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px">✕</button>
      </div>
      ` : `
      ${d.location ? `<div style="font-size:13px;color:var(--text2);margin:4px 0;font-family:var(--mono)">${d.location}</div>` : ''}
      `}
      <div class="detail-meta">
        ${ROLES[currentUser.role].canAdmin ? `
        <span class="meta-badge ${d.type==='GAS'?'meta-gas':'meta-fire'}" style="cursor:pointer;position:relative" title="Κλικ για αλλαγή τύπου" onclick="toggleTypePicker('${d.tag}',this)">
          ${d.type} ▾
          <select id="type-picker" style="display:none;position:absolute;top:100%;left:0;z-index:999;background:var(--bg3);color:var(--text1);border:1px solid var(--border);border-radius:6px;padding:4px;font-size:12px;min-width:90px"
            onchange="setDetType('${d.tag}',this.value)" onclick="event.stopPropagation()">
            <option value="GAS"  ${d.type==='GAS' ?'selected':''}>GAS</option>
            <option value="FIRE" ${d.type==='FIRE'?'selected':''}>FIRE</option>
          </select>
        </span>` : `<span class="meta-badge ${d.type==='GAS'?'meta-gas':'meta-fire'}">${d.type}</span>`}
        ${ROLES[currentUser.role].canAdmin ? `
        <span class="meta-badge meta-area" style="cursor:pointer;position:relative" title="Κλικ για αλλαγή περιοχής" onclick="toggleAreaPicker('${d.tag}',this)">
          📍 ${d.area} ▾
          <select id="area-picker" style="display:none;position:absolute;top:100%;left:0;z-index:999;background:var(--bg3);color:var(--text1);border:1px solid var(--border);border-radius:6px;padding:4px;font-size:12px;min-width:120px"
            onchange="setDetArea('${d.tag}',this.value)" onclick="event.stopPropagation()">
            ${DET_AREAS.map(a => `<option value="${a}" ${d.area===a?'selected':''}>${a}</option>`).join('')}
          </select>
        </span>` : `<span class="meta-badge meta-area">${d.area}</span>`}
        ${ROLES[currentUser.role].canAdmin ? `
        <span class="meta-badge meta-area" style="cursor:pointer;position:relative" title="Κλικ για αλλαγή κατηγορίας" onclick="toggleCategoryPicker('${d.tag}',this)">
          ${d.category || '— χωρίς κατηγορία —'} ▾
          <select id="category-picker" style="display:none;position:absolute;top:100%;left:0;z-index:999;background:var(--bg3);color:var(--text1);border:1px solid var(--border);border-radius:6px;padding:4px;font-size:12px;min-width:160px"
            onchange="if(this.value==='__new__'){addListItem('category','${d.tag}');this.value='${(d.category||'').replace(/'/g,"\\'")}';}else{setDetCategory('${d.tag}',this.value)}" onclick="event.stopPropagation()">
            ${DET_CATEGORIES.map(c => `<option value="${c}" ${d.category===c?'selected':''}>${c}</option>`).join('')}

        <div style="font-size:12px;color:${alertColor};font-family:var(--cond);font-weight:600">${alertText}</div>
        <div style="display:flex;gap:16px;margin-top:6px;font-size:12px;color:var(--text3)">
          <span>Τελευταίος: <span style="color:var(--text2);font-family:var(--mono)">${formatDate(lastCal)}</span></span>
          <span>Επόμενος: <span style="color:${alertColor};font-family:var(--mono)">${formatDate(nextDate)}</span></span>
          <span>Interval: <span style="color:var(--text2)">${interval}μ</span></span>
        </div>
      </div>
      ${ROLES[currentUser.role].canAdmin ? `
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
        <span style="font-size:12px;color:var(--text3)">Interval:</span>
        <select class="interval-select" onchange="setDetInterval('${d.tag}',this.value)">
          <option value="2"  ${interval===2?'selected':''}>2 μήνες</option>
          <option value="4"  ${interval===4?'selected':''}>4 μήνες</option>
          <option value="6"  ${interval===6?'selected':''}>6 μήνες</option>
          <option value="12" ${interval===12?'selected':''}>12 μήνες</option>
        </select>
        <span style="font-size:12px;color:var(--text3)">Επόμενος:</span>
        ${dateMaskInputHTML('det-nextdate-'+d.tag.replace(/[^a-zA-Z0-9]/g,''), nextDate, "v => setDetNextDate('"+d.tag+"', v)", 'width:90px;padding:4px 8px;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text1);font-family:var(--mono)')}
      </div>` : ''}
    </div>
    ${ROLES[currentUser.role].canAdd ? `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <button class="submit-btn" onclick="addForDetector('${d.tag}')">➕ Νέα εγγραφή</button>
      <button class="submit-btn" onclick="exportPDF('detector')" style="background:var(--blue)">📄 PDF</button>
      <button class="submit-btn" onclick="showQRModal('${d.tag}')" style="background:var(--purple)">📲 QR</button>
    </div>
    ` : `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <button class="submit-btn" onclick="exportPDF('detector')" style="background:var(--blue)">📄 Εξαγωγή PDF</button>
      <button class="submit-btn" onclick="showQRModal('${d.tag}')" style="background:var(--purple)">📲 QR</button>
    </div>
    `}
    <div class="card-title" style="margin-bottom:10px">${t('history')}</div>
    ${d.entries.length ? d.entries.slice().reverse().map(e => `
      <div class="history-entry">
        <div class="hist-date">📅 ${formatDate(e.date)}</div>
        <div class="hist-task">🔧 ${e.task}</div>
        <div class="hist-tech">👤 ${e.tech} ${e.cylinder ? `<span class="hist-cylinder">${e.cylinder}</span>` : ''}</div>
        ${e.notes ? `<div class="hist-tech" style="margin-top:4px;font-style:italic">💬 ${e.notes}</div>` : ''}
      </div>
    `).join('') : `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">${t('no-hist')}</div></div>`}
  `;
}

function setDetInterval(tag, val) {
  const det = DETECTORS.find(d => d.tag === tag);
  if (det) {
    det.calInterval = parseInt(val);
    gsUpdateDetector({ tag, calInterval: parseInt(val) });
    renderDetectorDetail(document.getElementById('main-content'));
  }
}

function setDetNextDate(tag, val) {
  const det = DETECTORS.find(d => d.tag === tag);
  if (det) {
    det.nextCalDate = val;
    gsUpdateDetector({ tag, nextCalDate: val });
    renderDetectorDetail(document.getElementById('main-content'));
  }
}

function toggleAreaPicker(tag, spanEl) {
  const sel = spanEl.querySelector('#area-picker');
  if (!sel) return;
  if (sel.style.display === 'none') {
    sel.style.display = 'block';
    sel.focus();
    // Κλείσιμο αν κλικάρεις αλλού
    setTimeout(() => {
      document.addEventListener('click', function closer() {
        sel.style.display = 'none';
        document.removeEventListener('click', closer);
      }, { once: true });
    }, 0);
  } else {
    sel.style.display = 'none';
  }
}

function setDetArea(tag, val) {
  const det = DETECTORS.find(d => d.tag === tag);
  if (!det || det.area === val) return;
  det.area = val;
  gsUpdateDetector({ tag, area: val });
  showToast('✓ Περιοχή → ' + val);
  renderDetectorDetail(document.getElementById('main-content'));
}

function toggleTypePicker(tag, spanEl) {
  const sel = spanEl.querySelector('#type-picker');
  if (!sel) return;
  if (sel.style.display === 'none') {
    sel.style.display = 'block';
    sel.focus();
    setTimeout(() => {
      document.addEventListener('click', function closer() {
        sel.style.display = 'none';
        document.removeEventListener('click', closer);
      }, { once: true });
    }, 0);
  } else {
    sel.style.display = 'none';
  }
}

function setDetType(tag, val) {
  const det = DETECTORS.find(d => d.tag === tag);
  if (!det || det.type === val) return;
  det.type = val;
  gsUpdateDetector({ tag, type: val });
  showToast('✓ Τύπος → ' + val);
  renderDetectorDetail(document.getElementById('main-content'));
}

function toggleCategoryPicker(tag, spanEl) {
  const sel = spanEl.querySelector('#category-picker');
  if (!sel) return;
  if (sel.style.display === 'none') {
    sel.style.display = 'block';
    sel.focus();
    setTimeout(() => {
      document.addEventListener('click', function closer() {
        sel.style.display = 'none';
        document.removeEventListener('click', closer);
      }, { once: true });
    }, 0);
  } else {
    sel.style.display = 'none';
  }
}

function setDetCategory(tag, val) {
  const det = DETECTORS.find(d => d.tag === tag);
  if (!det || det.category === val) return;
  det.category = val;
  // Σημείωση: αν ο ανιχνευτής ΔΕΝ έχει χειροκίνητο det.calInterval, το interval
  // βαθμονόμησης θα αλλάξει αυτόματα στην επόμενη ανάγνωση (getIntervalMonths()
  // διαβάζει CAL_INTERVALS[category]). Αν έχει ήδη χειροκίνητο calInterval, αυτό
  // παραμένει ως override — όπως ακριβώς συμβαίνει και με την Interval επιλογή.
  gsUpdateDetector({ tag, category: val });
  showToast('✓ Κατηγορία → ' + val);
  renderDetectorDetail(document.getElementById('main-content'));
}

function startEditLocation(tag) {
  document.getElementById('loc-display-' + tag).style.display = 'none';
  const editDiv = document.getElementById('loc-edit-' + tag);
  editDiv.style.display = 'flex';
  document.getElementById('loc-input-' + tag).focus();
}

function cancelEditLocation(tag) {
  document.getElementById('loc-edit-' + tag).style.display = 'none';
  document.getElementById('loc-display-' + tag).style.display = 'flex';
}

function saveLocation(tag) {
  const det = DETECTORS.find(d => d.tag === tag);
  if (!det) return;
  const val = document.getElementById('loc-input-' + tag).value.trim();
  det.location = val;
  gsUpdateDetector({ tag, location: val });
  showToast('✓ Τοποθεσία → ' + (val || '(άδειο)'));
  renderDetectorDetail(document.getElementById('main-content'));
}

function showQRModal(tag) {
  const det = DETECTORS.find(d => d.tag === tag);
  if (!det) return;

  // URL που θα κωδικοποιηθεί — η app με ?tag=
  const base = window.location.origin + window.location.pathname;
  const qrUrl = `${base}?tag=${encodeURIComponent(tag)}`;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = 'qr-overlay';
  overlay.innerHTML = `
    <div class="modal-box" style="text-align:center;max-width:320px">
      <div class="modal-title" style="margin-bottom:4px">📲 QR Ανιχνευτή</div>
      <div style="font-family:var(--mono);font-size:14px;color:var(--accent);margin-bottom:2px">${tag}</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:16px">${det.description || det.location || det.area}</div>

      <div id="qr-canvas-wrap" style="display:inline-block;padding:12px;background:#fff;border-radius:8px;border:2px solid var(--border);margin-bottom:14px"></div>

      <div style="font-size:10px;color:var(--text3);margin-bottom:16px;word-break:break-all;padding:0 8px">${qrUrl}</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <button class="modal-ok" onclick="downloadQR('${tag}')">⬇ Αποθήκευση</button>
        <button class="modal-ok" onclick="printQR('${tag}')" style="background:var(--green)">🖨 Εκτύπωση</button>
      </div>
      <button class="modal-cancel" style="width:100%" onclick="document.getElementById('qr-overlay').remove()">Κλείσιμο</button>
    </div>
  `;
  document.body.appendChild(overlay);

  // Κλείσιμο με click έξω
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  // Δημιουργία QR με qrcode.js
  setTimeout(() => {
    const wrap = document.getElementById('qr-canvas-wrap');
    if (!wrap) return;
    new QRCode(wrap, {
      text: qrUrl,
      width: 200,
      height: 200,
      colorDark: '#1a2030',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }, 100);
}

function downloadQR(tag) {
  const wrap = document.getElementById('qr-canvas-wrap');
  const canvas = wrap?.querySelector('canvas');
  if (!canvas) { showToast('QR δεν είναι έτοιμο','error'); return; }
  const link = document.createElement('a');
  link.download = `QR_${tag}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('✓ Αποθηκεύτηκε QR_' + tag + '.png');
}

function printQR(tag) {
  const wrap = document.getElementById('qr-canvas-wrap');
  const canvas = wrap?.querySelector('canvas');
  if (!canvas) { showToast('QR δεν είναι έτοιμο','error'); return; }
  const det = DETECTORS.find(d => d.tag === tag);
  const imgData = canvas.toDataURL('image/png');
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>QR ${tag}</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    .tag { font-size: 22px; font-weight: bold; letter-spacing: 2px; margin-bottom: 6px; }
    .desc { font-size: 13px; color: #555; margin-bottom: 16px; }
    img { width: 220px; height: 220px; }
    .url { font-size: 9px; color: #999; margin-top: 10px; word-break: break-all; }
    @media print { body { margin: 0; } }
  </style></head><body>
    <div class="tag">${tag}</div>
    <div class="desc">${det?.description || det?.location || det?.area || ''}</div>
    <img src="${imgData}">
    <div class="url">VMRTIN26 · Motor Oil Refineries</div>
  </body></html>`);
  win.document.close();
  setTimeout(() => win.print(), 400);
}

function toggleTask(opt) {
  if (selectedTasks.includes(opt)) {
    selectedTasks = selectedTasks.filter(t => t !== opt);
  } else {
    selectedTasks.push(opt);
  }
  renderAdd(document.getElementById('main-content'));
}

function submitEntry() {
  const tag = document.getElementById('add-tag').value.trim();
  const date = document.getElementById('add-date__hidden').value;
  const cyl = document.getElementById('add-cyl').value.trim();
  const tech = document.getElementById('add-tech').value.trim();
  const notes = document.getElementById('add-notes').value.trim();
  const altro = document.getElementById('altro-text')?.value.trim() || '';

  if (!tag || !date || selectedTasks.length === 0) {
    showToast(lang==='el'?'Συμπλήρωσε TAG, ημερομηνία και τύπο εργασίας':'Fill in TAG, date and task type', 'error');
    return;
  }

  let taskStr = selectedTasks.map(t => t === 'Άλλο' && altro ? altro : t).join(' | ');

  let det = DETECTORS.find(d => d.tag === tag);
  if (!det) {
    det = { tag, area: getArea(tag), type: 'GAS', entries: [] };
    DETECTORS.push(det);
  }
  det.entries.push({ date, task: taskStr, tech, cylinder: cyl, notes });

  // Save to localStorage
  saveDetectors();

  // Save to Google Sheets
  gsSaveEntry({
    tag, date, task: taskStr, cylinder: cyl, tech, notes,
    calInterval: getIntervalMonths(det),
  });

  // Auto-update next cal date για ΚΑΘΕ τύπο εργασίας συντήρησης
  // (Βαθμονόμηση, Αλλαγή αισθητήρα, Αλλαγή κάρτας, Αλλαγή καλωδίου, Άλλο)
  // — κάθε επέμβαση μηδενίζει το ρολόι μέχρι τον επόμενο προγραμματισμένο έλεγχο.
  const interval = getIntervalMonths(det);
  const nextDate = new Date(date);
  nextDate.setMonth(nextDate.getMonth() + interval);
  det.nextCalDate = nextDate.toISOString().split('T')[0];
  gsUpdateDetector({ tag, nextCalDate: det.nextCalDate });

  selectedTasks = [];
  selectedDetector = det;
  showToast(t('saved'));
  setTimeout(() => showPage('detector-detail'), 800);
}

// ══ STATS ══
function renderStats(mc) {
  const taskCount = {};
  TASK_OPTIONS.forEach(t => taskCount[t] = 0);
  taskCount['Άλλο/Σύνθετο'] = 0;
  let total = 0;

  DETECTORS.forEach(d => d.entries.forEach(e => {
    total++;
    const tasks = e.task.split('|').map(s=>s.trim());
    tasks.forEach(task => {
      const found = TASK_OPTIONS.find(o => task.includes(o));
      if (found) taskCount[found] = (taskCount[found]||0) + 1;
      else taskCount['Άλλο/Σύνθετο'] = (taskCount['Άλλο/Σύνθετο']||0) + 1;
    });
  }));

  const areaStats = {};
  DETECTORS.forEach(d => {
    if (!areaStats[d.area]) areaStats[d.area] = {total:0,done:0};
    areaStats[d.area].total++;
    if (d.entries.length>0) areaStats[d.area].done++;
  });

  const maxTask = Math.max(...Object.values(taskCount), 1);
  const taskColors = {
    'Βαθμονόμηση':      '#1a5fa8',
    'Αλλαγή αισθητήρα': '#c0251e',
    'Αλλαγή κάρτας':    '#5a3a8a',
    'Αλλαγή καλωδίου':  '#7a5800',
    'Άλλο':             '#1a7a88',
    'Άλλο/Σύνθετο':     '#1a7a88',
  };

  mc.innerHTML = `
    <div class="page-header">
      <div class="page-title">${t('stats-title')}</div>
      <div class="page-sub">${t('stats-sub')} · ${total} εγγραφές</div>
    </div>
    <div class="card">
      <div class="card-title">ΤΥΠΟΣ ΕΡΓΑΣΙΑΣ</div>
      <div class="bar-chart-wrap">
        ${Object.entries(taskCount).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([label,count]) => `
          <div class="bar-row">
            <div class="bar-label">${label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxTask*100)}%;background:${taskColors[label]||'var(--accent)'};"></div></div>
            <div class="bar-count">${count}</div>
          </div>
        `).join('')}
        ${total === 0 ? `<div class="empty-state"><div class="empty-text">Δεν υπάρχουν δεδομένα</div></div>` : ''}
      </div>
    </div>
    <div class="card">
      <div class="card-title">ΚΑΛΥΨΗ ΑΝΑ ΠΕΡΙΟΧΗ</div>
      ${Object.entries(areaStats).sort((a,b)=>b[1].total-a[1].total).map(([area,s]) => `
        <div class="bar-row">
          <div class="bar-label">${area}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(s.done/s.total*100)}%;background:var(--green);"></div></div>
          <div class="bar-count" style="color:var(--green2)">${Math.round(s.done/s.total*100)}%</div>
        </div>
      `).join('')}
    </div>
    <div class="card">
      <div class="card-title">ΣΥΝΟΨΗ</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div style="background:var(--bg3);border-radius:8px;padding:12px">
          <div style="font-family:var(--mono);font-size:20px;color:var(--accent)">${DETECTORS.length}</div>
          <div style="font-size:11px;color:var(--text3);font-family:var(--cond);font-weight:600;letter-spacing:0.5px">ΣΥΝΟΛΟ ΑΝΙΧΝ.</div>
        </div>
        <div style="background:var(--bg3);border-radius:8px;padding:12px">
          <div style="font-family:var(--mono);font-size:20px;color:var(--green2)">${DETECTORS.filter(d=>d.entries.length>0).length}</div>

        <div style="background:var(--bg3);border-radius:8px;padding:12px">

function showListManager(listType) {

  const getList = () => listType === 'type' ? DET_TYPES : DET_AREAS;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = 'listmgr-overlay';

  const renderItems = () => {
    const list = getList();
    return list.map((item, i) => `
      <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="flex:1;font-size:13px;font-family:var(--cond);font-weight:600">${item}</span>
        <button onclick="removeListItem('${listType}',${i})"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--red2);padding:3px 8px;cursor:pointer;font-size:12px">✕</button>

    `).join('');
  };

  overlay.innerHTML = `
    <div class="modal-box" style="text-align:left;max-height:80vh;overflow-y:auto">
      <div class="modal-title" style="margin-bottom:16px">📋 ${labels[listType]}</div>
