<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VMRTIN26 — Motor Oil Refineries</title>
<meta name="version" content="1.0.0">
<meta name="deploy" content="github-pages">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>🔥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* ── LIGHT STEEL INDUSTRIAL PALETTE ── */
  --bg:      #dde2e8;   /* ανοιχτό γκρι ατσάλι — φόντο */
  --bg2:     #eef1f4;   /* κάρτες — σχεδόν λευκό ατσάλι */
  --bg3:     #f5f7f9;   /* inputs — πολύ ανοιχτό */
  --bg4:     #c8cfd8;   /* hover/active */
  --border:  #b0bac8;   /* ορατό steel edge */
  --border2: #8a98aa;   /* έντονο edge */

  /* ── TEXT — σκούρο για αντίθεση ── */
  --text:    #1a2030;   /* σχεδόν μαύρο navy */
  --text2:   #3a4a5e;   /* δευτερεύον σκούρο */
  --text3:   #6a7a90;   /* muted */

  /* ── INDUSTRIAL BLUE — primary accent ── */
  --accent:  #1a5fa8;   /* βαθύ βιομηχανικό μπλε */
  --accent2: #2878cc;   /* ανοιχτότερο μπλε */

  /* ── STATUS COLORS ── */
  --blue:    #1a5fa8;
  --blue2:   #2878cc;
  --green:   #1e7a42;   /* safety green */
  --green2:  #28a05a;
  --red:     #c0251e;   /* hazard red */
  --red2:    #e03830;
  --purple:  #5a3a8a;
  --purple2: #7a5aaa;
  --cyan:    #1a7a88;

  --font:  'Rajdhani', sans-serif;
  --mono:  'Share Tech Mono', monospace;
  --cond:  'Oswald', sans-serif;
  --radius:  6px;
  --radius2: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: var(--font);
  background: var(--bg);
  background-image:
    repeating-linear-gradient(
      0deg, transparent, transparent 39px,
      rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px
    ),
    repeating-linear-gradient(
      90deg, transparent, transparent 79px,
      rgba(0,0,0,0.02) 79px, rgba(0,0,0,0.02) 80px
    );
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  letter-spacing: 0.2px;
}

/* ── LOGIN ── */
#login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  background:
    linear-gradient(160deg, #c8d0da 0%, #dde2e8 60%, #d0d8e4 100%);
}

.login-card {
  width: 100%;
  max-width: 360px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-top: 3px solid var(--accent);
  border-radius: var(--radius2);
  padding: 32px 28px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15), 0 2px 8px rgba(26,95,168,0.12);
}

.login-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}

.login-logo .logo-icon {
  width: 38px;
  height: 38px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.login-logo .logo-text {
  font-family: var(--cond);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
  line-height: 1.2;
}

.login-logo .logo-sub {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.login-title {
  font-family: var(--cond);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}

.login-sub {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 24px;
}

.field-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}

.field-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  padding: 10px 12px;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}

.field-input:focus { border-color: var(--accent); }

.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #0f1117;
  border: none;
  border-radius: var(--radius);
  font-family: var(--cond);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 12px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

.btn-primary:active { transform: scale(0.98); }
.btn-primary:hover { background: var(--accent2); }

.login-hint {
  margin-top: 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  font-size: 12px;
  color: var(--text3);
}

.login-hint table { width: 100%; border-collapse: collapse; }
.login-hint td { padding: 3px 0; }
.login-hint td:first-child { color: var(--accent); font-family: var(--mono); font-size: 11px; width: 60px; }
.login-hint .role-badge { 
  font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
  font-family: var(--cond); letter-spacing: 0.3px;
}
.role-admin   { background: #fde8e0; color: #8a2010; border: 1px solid #f0a090; }
.role-super   { background: #fef8e0; color: #7a5800; border: 1px solid #e8d080; }
.role-tech    { background: #e0ecf8; color: #0a3a70; border: 1px solid #90bce0; }
.role-view    { background: #e0f4e8; color: #0a4a20; border: 1px solid #80c8a0; }

.login-error {
  color: var(--red2);
  font-size: 13px;
  text-align: center;
  margin-top: 12px;
  display: none;
}

/* ── APP SHELL ── */
#app { display: none; flex-direction: column; min-height: 100vh; }

.topbar {
  background: #1a2535;
  border-bottom: 2px solid var(--accent);
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.topbar-logo {
  font-family: var(--cond);
  font-size: 17px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.topbar-tag {
  font-family: var(--mono);
  font-size: 11px;
  color: #a0b4cc;
  background: rgba(255,255,255,0.1);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.15);
}

.topbar-tag {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  background: var(--bg3);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.user-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 4px 10px 4px 6px;
  font-size: 12px;
  cursor: pointer;
}

.user-avatar {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--cond);
}

.icon-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius);
  color: #a0b4cc;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: border-color 0.2s, color 0.2s;
}
.icon-btn:hover { border-color: var(--accent2); color: #fff; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #1a2535;
  border-top: 2px solid var(--accent);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -4px 16px rgba(0,0,0,0.2);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px 6px;
  cursor: pointer;
  transition: color 0.2s;
  color: #607080;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  font-family: var(--cond);
  text-transform: uppercase;
  gap: 3px;
  border: none;
  background: none;
}

.nav-item .nav-icon { font-size: 20px; line-height: 1; }
.nav-item.active { color: #60aaee; }
.nav-item.active .nav-icon { filter: drop-shadow(0 0 5px rgba(40,120,204,0.6)); }

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px 6px;
  cursor: pointer;
  transition: color 0.2s;
  color: var(--text3);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  font-family: var(--cond);
  text-transform: uppercase;
  gap: 3px;
  border: none;
  background: none;
}

.nav-item .nav-icon { font-size: 20px; line-height: 1; }
.nav-item.active { color: var(--accent); }
.nav-item.active .nav-icon { filter: drop-shadow(0 0 5px rgba(232,98,26,0.5)); }

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1;
  padding: 16px;
  padding-bottom: 80px;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}

/* ── PAGE HEADERS ── */
.page-header {
  margin-bottom: 20px;
}

.page-title {
  font-family: var(--cond);
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.3px;
}

.page-sub {
  font-size: 13px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── CARDS ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 16px;
  margin-bottom: 12px;
}

.card-title {
  font-family: var(--cond);
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ── KPI GRID ── */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.kpi-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 14px;
  position: relative;
  overflow: hidden;
}

.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}

.kpi-card.amber::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.kpi-card.blue::before  { background: linear-gradient(90deg, #0a3060, var(--blue2)); }
.kpi-card.green::before { background: linear-gradient(90deg, #0a4020, var(--green2)); }
.kpi-card.red::before   { background: linear-gradient(90deg, #6a1010, var(--red2)); }

.kpi-value {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 600;
  line-height: 1;
  margin-bottom: 4px;
}

.kpi-card.amber .kpi-value { color: var(--accent); }
.kpi-card.blue  .kpi-value { color: var(--blue2); }
.kpi-card.green .kpi-value { color: var(--green2); }
.kpi-card.red   .kpi-value { color: var(--red2); }

.kpi-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-family: var(--cond);
}

/* ── SEARCH BAR ── */
.search-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.search-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); font-family: var(--font); }

.qr-btn {
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #0f1117;
  width: 42px;
  height: 42px;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}
.qr-btn:hover { background: var(--accent2); }

/* ── DETECTOR LIST ── */
.detector-item {
  display: flex;
  align-items: center;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  gap: 12px;
}

.detector-item:hover, .detector-item:active {
  border-color: var(--accent);
  background: var(--bg3);
}

.det-tag {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  min-width: 110px;
}

.det-area {
  flex: 1;
  font-size: 12px;
  color: var(--text3);
}

.det-status {
  font-size: 10px;
  font-weight: 600;
  font-family: var(--cond);
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.status-ok     { background: #d0f0dc; color: #0a4a20; border: 1px solid #80c8a0; }
.status-done   { background: #d0e8f8; color: #0a3060; border: 1px solid #80b8e0; }
.status-pending{ background: #fef0d0; color: #6a4000; border: 1px solid #e0b860; }
.status-new    { background: #e8ecf0; color: #6a7a90; border: 1px solid #b0bac8; }

.det-arrow { color: var(--text3); font-size: 16px; }

/* ── FILTER PILLS ── */
.filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 6px;
  margin-bottom: 14px;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-pill {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--cond);
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: all 0.15s;
}
.filter-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0f1117;
}

/* ── DETECTOR DETAIL ── */
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text3);
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 16px;
  background: none;
  border: none;
  padding: 0;
  font-family: var(--font);
}
.back-btn:hover { color: var(--accent); }

.detail-header {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 18px;
  margin-bottom: 14px;
}

.detail-tag {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
}

.detail-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.meta-badge {
  font-size: 11px;
  font-family: var(--cond);
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.3px;
}
.meta-gas  { background: #daeaf8; color: #0a3060; border: 1px solid #90bce0; }
.meta-fire { background: #fde0da; color: #6a1010; border: 1px solid #e09080; }
.meta-area { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.meta-year { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); font-family: var(--mono); }

/* ── HISTORY TABLE ── */
.history-entry {
  border-left: 2px solid var(--border);
  padding: 10px 14px;
  margin-bottom: 8px;
  background: var(--bg2);
  border-radius: 0 var(--radius) var(--radius) 0;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  background: linear-gradient(90deg, rgba(26,95,168,0.06) 0%, transparent 50%);
}

.hist-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 4px;
}

.hist-task {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 3px;
}

.hist-tech {
  font-size: 12px;
  color: var(--text3);
}

.hist-cylinder {
  display: inline-block;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  margin-left: 6px;
}

/* ── ADD ENTRY FORM ── */
.form-group { margin-bottom: 14px; }

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  font-family: var(--cond);
}

.form-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }

/* Multi-select task chips */
.task-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.task-chip {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font);
  display: flex;
  align-items: center;
  gap: 6px;
}

.task-chip.selected {
  background: rgba(26,95,168,0.12);
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: inset 0 0 0 1px rgba(26,95,168,0.2);
}

.task-chip .chip-check { font-size: 14px; }

.altro-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 8px 12px;
  outline: none;
  margin-top: 8px;
  display: none;
  transition: border-color 0.2s;
}
.altro-input:focus { border-color: var(--accent); }
.altro-input.show { display: block; }

/* ── STATS PAGE ── */
.bar-chart-wrap { margin-top: 10px; }

.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.bar-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  min-width: 160px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bar-track {
  flex: 1;
  background: var(--bg3);
  border-radius: 3px;
  height: 8px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

.bar-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  min-width: 24px;
  text-align: right;
}

/* ── ADMIN PAGE ── */
.user-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.user-row:last-child { border-bottom: none; }

.user-info { flex: 1; }

let DET_CATEGORIES = Object.keys(CAL_INTERVALS).filter(k => k !== 'DEFAULT');

// Load saved lists from localStorage

const getArea = tag => {

// Ξεκινάει κενό — γεμίζει από Import Excel ή Google Sheets sync
let DETECTORS = [];

// Load saved detectors from localStorage (persists between sessions)
function loadSavedDetectors() {
  try {
    const saved = localStorage.getItem('vmrtin26_detectors');
    if (saved) {
      DETECTORS = JSON.parse(saved);
    }

}

    localStorage.setItem('vmrtin26_detectors', JSON.stringify(DETECTORS));
  } catch(e) {}

loadSavedDetectors();

const TASK_OPTIONS = ['Βαθμονόμηση','Αλλαγή αισθητήρα','Αλλαγή κάρτας','Αλλαγή καλωδίου','Άλλο'];

// ══════════════════════════════════════════
// GOOGLE SHEETS API
// ══════════════════════════════════════════
const GS_URL = 'https://script.google.com/macros/s/AKfycbzgG1XgSpKdnpYjiE8DMgJ-G4Hc7_LP1AdUD0CkzQMWdty0pPVNX4RBAzKRAKla3E5zCA/exec';
let gsConnected = false;
let gsSyncing   = false;

async function gsGet(params) {
  // JSONP — μόνος τρόπος για Apps Script από GitHub Pages
  return new Promise((resolve, reject) => {
    const cbName = 'gs_cb_' + Date.now();
    const url = GS_URL + '?' + new URLSearchParams({...params, callback: cbName});
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cbName];
      script.remove();
      reject(new Error('Timeout'));
    }, 15000);
    window[cbName] = (data) => {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      resolve(data);
    };
    script.src = url;
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      reject(new Error('Script load error'));
    };
    document.head.appendChild(script);
  });
}

async function gsPost(data) {
  const res = await fetch(GS_URL, {
    method: 'POST',
    redirect: 'follow',
    mode: 'cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(data),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ── Load all data from Google Sheets ──
async function syncFromSheets() {
  if (gsSyncing) return;
  gsSyncing = true;
  showSyncStatus('⟳ Συγχρονισμός...');

  try {
    // Load detectors
    const detRes = await gsGet({ action: 'getDetectors' });
    if (detRes.detectors && detRes.detectors.length > 0) {
      // Merge with local — remote wins for metadata
      for (const remote of detRes.detectors) {
        let local = DETECTORS.find(d => d.tag === remote.tag);
        if (local) {
          local.description = remote.description || local.description;
          local.location    = remote.location    || local.location;
          local.type        = remote.type        || local.type;
          local.area        = remote.area        || local.area;
          local.category    = remote.category    || local.category;
          local.calInterval = remote.calInterval || local.calInterval;
          local.nextCalDate = remote.nextCalDate || local.nextCalDate;
        } else {
          DETECTORS.push({ ...remote, entries: [] });
        }
      }
    }

    // Load all entries
    const entRes = await gsGet({ action: 'getAllEntries' });
    if (entRes.entries && entRes.entries.length > 0) {
      // Clear demo entries and replace with real data
      DETECTORS.forEach(d => d.entries = []);
      for (const e of entRes.entries) {
        const det = DETECTORS.find(d => d.tag === e.tag);
        if (det) {
          det.entries.push({
            date:     e.date,
            task:     e.task,
            cylinder: e.cylinder,
            tech:     e.tech,
            notes:    e.notes,
          });
        }
      }
      // Sort entries by date
      DETECTORS.forEach(d => d.entries.sort((a,b) => a.date.localeCompare(b.date)));
    }

    // Load users
    const usrRes = await gsGet({ action: 'getUsers' });
    if (usrRes.users && usrRes.users.length > 0) {
      for (const u of usrRes.users) {
        if (USERS[u.username]) {
          USERS[u.username].passHash = u.passHash || USERS[u.username].passHash;
          USERS[u.username].role     = u.role     || USERS[u.username].role;
          USERS[u.username].name     = u.name     || USERS[u.username].name;
        } else {
          USERS[u.username] = {
            passHash: u.passHash || '',
            role:     u.role || 'readonly',
            name:     u.name || u.username,
            dept:     u.dept || '',
          };
        }
      }
    }

    gsConnected = true;
    showSyncStatus('✓ Συνδεδεμένο', 'ok');
    if (currentPage) showPage(currentPage);

  } catch(err) {
    console.error('Sync error:', err);
    gsConnected = false;
    showSyncStatus('✗ Offline', 'err');
  } finally {
    gsSyncing = false;
  }
}

  }
  el.textContent = msg;
  el.style.background = type === 'ok'  ? 'rgba(30,122,66,0.3)'  :
                        type === 'err' ? 'rgba(192,37,30,0.3)'  :
                        'rgba(255,255,255,0.1)';
  el.style.color = type === 'ok'  ? '#80d49a' :
                   type === 'err' ? '#f07068' : '#a0b4cc';
  el.style.border = `1px solid ${type === 'ok' ? 'rgba(30,122,66,0.4)' : type === 'err' ? 'rgba(192,37,30,0.4)' : 'rgba(255,255,255,0.15)'}`;
}

// ══════════════════════════════════════════
// DATE HELPERS
// ══════════════════════════════════════════
function getIntervalMonths(det) {
  if (det.calInterval) return det.calInterval;
  return CAL_INTERVALS[det.category] || CAL_INTERVALS['DEFAULT'];
}

function getLastCalDate(det) {
  if (!det.entries.length) return null;
  const sorted = det.entries
    .filter(e => e.task.toLowerCase().includes('βαθμονόμηση') || e.task.toLowerCase().includes('calib'))
    .sort((a,b) => b.date.localeCompare(a.date));
  if (sorted.length) return sorted[0].date;
  // fallback: last entry
  return det.entries.slice().sort((a,b) => b.date.localeCompare(a.date))[0].date;
}

function getNextCalDate(det) {
  if (det.nextCalDate) return det.nextCalDate; // manually set
  const last = getLastCalDate(det);
  if (!last) return null;
  const d = new Date(last);
  d.setMonth(d.getMonth() + getIntervalMonths(det));
  return d.toISOString().split('T')[0];
}

function getAlertStatus(det) {
  const next = getNextCalDate(det);
  if (!next) return 'none';
  const today = new Date();
  const nextD = new Date(next);
  const diffDays = Math.round((nextD - today) / 86400000);
  if (diffDays < 0)  return 'overdue';
  if (diffDays <= 30) return 'soon';
  return 'ok';
}

function getDaysUntil(dateStr) {
  if (!dateStr) return null;
  return Math.round((new Date(dateStr) - new Date()) / 86400000);
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('el-GR', { day:'2-digit', month:'2-digit', year:'numeric' });
}

// EXCEL IMPORT (via SheetJS)
// ══════════════════════════════════════════
let sheetJsLoaded = false;

function loadSheetJS(cb) {
  if (sheetJsLoaded) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = () => { sheetJsLoaded = true; cb(); };
  s.onerror = () => showToast('Σφάλμα φόρτωσης βιβλιοθήκης', 'error');
  document.head.appendChild(s);
}

function triggerImport() {
  document.getElementById('excel-file-input').click();
}

function handleFileImport(input) {
  const file = input.files[0];
  if (!file) return;
  loadSheetJS(() => {
    const reader = new FileReader();
    reader.onload = e => parseExcelFile(e.target.result, file.name);
    reader.readAsArrayBuffer(file);
  });
  input.value = ''; // reset so same file can be re-imported
}

function parseExcelFile(buffer, filename) {
  try {
    showToast('⟳ Ανάγνωση αρχείου...', 'info');
    const wb = XLSX.read(buffer, { type: 'array', cellDates: true });

    let imported = 0, updated = 0, entryCount = 0;
    const sheetNames = wb.SheetNames.filter(n => n !== 'INDEX' && n.includes('-'));

    // ── Read INDEX for metadata (Row 3 = headers, Row 4+ = data) ──
    const indexData = {};
    if (wb.SheetNames.includes('INDEX')) {
      const ix = XLSX.utils.sheet_to_json(wb.Sheets['INDEX'], { header:1, defval:null });
      // Row index 2 = headers, Row index 3+ = data
      for (let r = 3; r < ix.length; r++) {
        const row = ix[r];
        if (!row || !row[1]) continue;
        const tag = String(row[1]).trim();
        if (!tag || tag === 'DETECTOR TAG') continue;
        indexData[tag] = {
          category:    row[0] ? String(row[0]).trim() : '',
          location:    row[2] ? String(row[2]).trim() : '',
          latestDate:  row[3] ? excelDateToStr(row[3]) : null,
          nextCalDate: row[4] ? excelDateToStr(row[4]) : null,
        };
      }
    }

    // ── Process each detector sheet ──
    for (const sheetName of sheetNames) {
      const tag = sheetName.trim();
      const ws  = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null, raw:false });

      // Row 3 (index 2) = ΠΕΡΙΓΡΑΦΗ / LOCATION
      // Row 4 (index 3) = ΤΥΠΟΣ (manufacturer)
      const description = rows[2] && rows[2][1] ? String(rows[2][1]).trim() : '';
      const typeVal     = rows[3] && rows[3][1] ? String(rows[3][1]).trim() : '';

      // Row 9 (index 8) = column headers
      // Detect column order from header row
      const headerRow = rows[8] || [];
      let colDate = 0, colTask = 1, colCyl = 2, colTech = 3, colNotes = 4;
      headerRow.forEach((h, i) => {
        if (!h) return;
        const hs = String(h).toUpperCase();
        if (hs.includes('ΗΜΕΡ') || hs.includes('DATE'))   colDate  = i;
        if (hs.includes('ΕΡΓΑΣ') || hs.includes('TASK'))  colTask  = i;
        if (hs.includes('ΦΙΑΛ') || hs.includes('CYL'))    colCyl   = i;
        if (hs.includes('ΤΕΧΝ') || hs.includes('TECH') || hs.includes('NAME')) colTech = i;
        if (hs.includes('ΣΗΜΕ') || hs.includes('NOTE') || hs.includes('ΤΥΠΟΣ')) colNotes = i;
      });

      // Parse entries from row 10+ (index 9)
      const entries = [];
      for (let r = 9; r < rows.length; r++) {
        const row = rows[r];
        if (!row || !row[colDate]) continue;
        const dateStr = excelDateToStr(row[colDate]);
        if (!dateStr) continue;

        // Handle NNC format: col2=tech, no cylinder
        const taskVal = row[colTask] ? String(row[colTask]).trim() : '';
        const cylVal  = row[colCyl]  ? String(row[colCyl]).trim()  : '';
        const techVal = row[colTech] ? String(row[colTech]).trim() : '';
        const notesVal= row[colNotes]? String(row[colNotes]).trim(): '';

        // Skip if cylinder value looks like a technician name (NNC has no cylinder col)
        const isCylNum = cylVal && /^\d+$/.test(cylVal.replace(/[^\d]/g,'').slice(0,4));
        const finalCyl  = isCylNum ? cylVal : '';
        const finalTech = isCylNum ? techVal : (cylVal || techVal);

        if (!taskVal && !finalTech) continue;

        entries.push({ date: dateStr, task: taskVal, cylinder: finalCyl, tech: finalTech, notes: notesVal });
      }

      // ── Smart merge ──
      let det = DETECTORS.find(d => d.tag === tag);
      const meta = indexData[tag] || {};

      if (det) {
        let changed = false;
        // Ενημερώνει metadata ΜΟΝΟ αν άλλαξε
        if (meta.category    && meta.category    !== det.category)    { det.category    = meta.category;    changed = true; }
        if (meta.location    && meta.location    !== det.location)    { det.location    = meta.location;    changed = true; }
        if (meta.nextCalDate && meta.nextCalDate !== det.nextCalDate) { det.nextCalDate = meta.nextCalDate; changed = true; }
        if (description      && description      !== det.description) { det.description = description;      changed = true; }

        // Προσθέτει ΜΟΝΟ νέες εγγραφές
        const existingKeys = new Set(det.entries.map(e => e.date + '|' + e.task));
        for (const e of entries) {
          if (!existingKeys.has(e.date + '|' + e.task)) {
            det.entries.push(e);
            entryCount++;
            changed = true;
          }
        }
        if (changed) { det._updated = true; updated++; }
      } else {
        det = {
          tag,
          description,
          manufacturer: typeVal,
          location:     meta.location    || '',
          area:         getArea(tag),
          type:         'GAS',
          category:     meta.category    || 'ΕΎΦΛΕΚΤΑ ΑΕΡΙΑ',
          calInterval:  null,
          nextCalDate:  meta.nextCalDate  || null,
          entries,
        };
        det._imported = true;
        DETECTORS.push(det);
        entryCount += entries.length;
        imported++;
      }
    }

    // Sort entries by date
    DETECTORS.forEach(d => d.entries.sort((a,b) => a.date.localeCompare(b.date)));

    // Save to localStorage για persistence
    saveDetectors();

    // Push to Google Sheets if connected
    // Στέλνουμε ΟΛΟΥΣ (νέους + ενημερωμένους) — το Sheet κάνει upsert
    if (gsConnected) {
      const allChanged = DETECTORS.filter(d => d._imported || d._updated);
      if (allChanged.length > 0) {
        gsPost({ action: 'importDetectors', data: allChanged.map(d => ({
          tag: d.tag, description: d.description||'', location: d.location||'',
          type: d.type||'GAS', area: d.area||'', category: d.category||'',
          calInterval: d.calInterval||'', nextCalDate: d.nextCalDate||'',
        }))}).catch(()=>{});
        allChanged.forEach(d => { delete d._imported; delete d._updated; });
      }
    }

    showToast(`✓ ${filename}: ${imported} νέοι · ${updated} ενημερώθηκαν · ${entryCount} εγγραφές`);
    if (currentPage) showPage(currentPage);

  } catch(err) {
    console.error('Import error:', err);
    showToast('Σφάλμα import: ' + err.message, 'error');
  }
}

function excelDateToStr(val) {
  if (!val) return null;
  if (val instanceof Date) {
    const y = val.getFullYear();
    const m = String(val.getMonth()+1).padStart(2,'0');
    const d = String(val.getDate()).padStart(2,'0');
    if (y < 1950 || y > 2100) return null;
    return `${y}-${m}-${d}`;
  }
  if (typeof val === 'string') {
    const ddmm = val.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if (ddmm) return `${ddmm[3]}-${ddmm[2].padStart(2,'0')}-${ddmm[1].padStart(2,'0')}`;
    const iso = val.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
  }
  return null;
}

// CSV EXPORT για Google Sheets
// ══════════════════════════════════════════
function exportCSVForSheets(type) {
  const BOM = '\uFEFF';
  let csv = '', filename = '';

  if (type === 'detectors') {
    // DETECTORS tab
    const headers = ['TAG','DESCRIPTION','LOCATION','TYPE','AREA','CATEGORY','CAL_INTERVAL','NEXT_CAL_DATE'];
    const rows = DETECTORS.map(d => [
      d.tag,
      `"${(d.description||'').replace(/"/g,'""')}"`,
      `"${(d.location||'').replace(/"/g,'""')}"`,
      d.type || 'GAS',
      d.area || '',
      d.category || '',
      d.calInterval || '',
      d.nextCalDate || '',
    ]);
    csv = BOM + [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
    filename = 'VMRTIN26_DETECTORS.csv';
    showToast(`✓ ${DETECTORS.length} ανιχνευτές εξήχθησαν`);

  } else if (type === 'entries') {
    // ENTRIES tab
    const headers = ['TAG','DATE','TASK','CYLINDER','TECHNICIAN','NOTES','TIMESTAMP'];
    const rows = [];
    DETECTORS.forEach(d => {
      d.entries.forEach(e => {
        rows.push([
          d.tag,
          e.date,
          `"${(e.task||'').replace(/"/g,'""')}"`,
          `"${(e.cylinder||'').replace(/"/g,'""')}"`,
          `"${(e.tech||'').replace(/"/g,'""')}"`,
          `"${(e.notes||'').replace(/"/g,'""')}"`,
          new Date().toISOString(),
        ]);
      });
    });
    csv = BOM + [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
    filename = 'VMRTIN26_ENTRIES.csv';
    showToast(`✓ ${rows.length} εγγραφές εξήχθησαν`);
  }

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════
// AUTH — SHA-256 HASHED PASSWORDS
// ══════════════════════════════════════════

// Passwords stored as SHA-256 hashes — never plain text
// Default hash = SHA-256 of username (admin→admin, tech1→tech1 etc.)
// Change passwords from Admin panel or user settings
// To generate a new hash: hashPassword('newpassword').then(h => console.log(h))

// ══════════════════════════════════════════
// SHA-256 — δουλεύει και από file://
// ══════════════════════════════════════════
async function hashPassword(password) {
  // Try crypto.subtle (https://)
  if (window.crypto && window.crypto.subtle && window.location.protocol !== 'file:') {
    const buf  = new TextEncoder().encode(password);
    const hash = await window.crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  // Fallback: pure JS SHA-256 για file://
  return sha256(password);
}

// Pure JS SHA-256 (για file://)
function sha256(str) {
  function rightRotate(value, amount) {
    return (value >>> amount) | (value << (32 - amount));
  }
  const mathPow = Math.pow;
  const maxWord = mathPow(2, 32);
  let result = '';
  const words = [];
  const asciiBitLength = str.length * 8;
  let hash = [];
  let k = [];
  let primeCounter = 0;
  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (let i = candidate * candidate; i < 313; i += candidate) isComposite[i] = true;
      hash[primeCounter] = (mathPow(candidate, 0.5) * maxWord) | 0;
      k[primeCounter++]  = (mathPow(candidate, 1/3) * maxWord) | 0;
    }
  }
  str += '\x80';
  while (str.length % 64 - 56) str += '\x00';
  for (let i = 0; i < str.length; i++) {
    const j = str.charCodeAt(i);
    if (j >> 8) return ''; // non-ASCII
    words[i >> 2] |= j << ((3 - i) % 4) * 8;
  }
  words[words.length] = ((asciiBitLength / maxWord) | 0);
  words[words.length] = (asciiBitLength | 0);
  for (let j = 0; j < words.length;) {
    const w = words.slice(j, j += 16);
    const oldHash = [...hash];
    for (let i = 0; i < 64; i++) {
      const w15 = w[i-15], w2 = w[i-2];
      const a = hash[0], e = hash[4];
      const temp1 = hash[7]
        + (rightRotate(e,6) ^ rightRotate(e,11) ^ rightRotate(e,25))
        + ((e & hash[5]) ^ (~e & hash[6]))
        + k[i]
        + (w[i] = (i < 16) ? w[i] : (
            w[i-16]
            + (rightRotate(w15,7) ^ rightRotate(w15,18) ^ (w15>>>3))
            + w[i-7]
            + (rightRotate(w2,17) ^ rightRotate(w2,19) ^ (w2>>>10))
          ) | 0);
      const temp2 = (rightRotate(a,2) ^ rightRotate(a,13) ^ rightRotate(a,22))
        + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
      hash = [(temp1+temp2)|0,...hash];
      hash[4] = (hash[4]+temp1)|0;
      hash.length = 8;
    }
    hash = hash.map((v,i) => (v+oldHash[i])|0);
  }
  hash.forEach(v => {
    for (let i = 7; i >= 0; i--) result += ((v>>>(i*4)) & 0xf).toString(16);
  });
  return result;
}

// Load saved passwords from localStorage (override defaults)
function loadSavedPasswords() {
  try {
    const saved = localStorage.getItem('vmrtin26_passwords');
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.entries(parsed).forEach(([u, hash]) => {
        if (USERS[u]) USERS[u].passHash = hash;
      });
    }
  } catch(e) {}
}

function savePasswordHash(username, hash) {
  try {
    const saved = JSON.parse(localStorage.getItem('vmrtin26_passwords') || '{}');
    saved[username] = hash;
    localStorage.setItem('vmrtin26_passwords', JSON.stringify(saved));
  } catch(e) {}
  // Also save to Google Sheets
  gsSavePassword(username, hash);
}

  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const user = USERS[u];
  if (!user) { showLoginError(); return; }

  const inputHash = await hashPassword(p);
  if (inputHash === user.passHash) {

    document.getElementById('app').style.display = 'flex';

      <input type="password" class="field-input" id="cp-new" placeholder="••••••••" style="margin-bottom:12px">
      <label class="field-label">ΕΠΙΒΕΒΑΙΩΣΗ</label>
      <input type="password" class="field-input" id="cp-confirm" placeholder="••••••••" style="margin-bottom:16px">
      <div id="cp-error" style="color:var(--red2);font-size:13px;margin-bottom:12px;display:none"></div>
      <div style="display:flex;gap:8px">
        <button class="modal-cancel" onclick="document.getElementById('chpass-overlay').remove()">Ακύρωση</button>
        <button class="modal-ok" onclick="doChangePassword('${targetUser}','${isOwnPass && !ROLES[currentUser.role].canAdmin}')">ΑΛΛΑΓΗ</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('cp-new')?.focus(), 100);
}

async function doChangePassword(targetUser, requireOld) {
  const newPass    = document.getElementById('cp-new')?.value || '';
  const confirmPass = document.getElementById('cp-confirm')?.value || '';
  const oldPass    = document.getElementById('cp-old')?.value || '';
  const errEl = document.getElementById('cp-error');

  if (newPass.length < 4) {
    errEl.textContent = 'Ο κωδικός πρέπει να έχει τουλάχιστον 4 χαρακτήρες'; errEl.style.display='block'; return;
  }
  if (newPass !== confirmPass) {
    errEl.textContent = 'Οι κωδικοί δεν ταιριάζουν'; errEl.style.display='block'; return;
  }

  // Verify old password if required
  if (requireOld === 'true') {
    const oldHash = await hashPassword(oldPass);
    if (oldHash !== USERS[targetUser].passHash) {
      errEl.textContent = 'Λάθος τρέχων κωδικός'; errEl.style.display='block'; return;
    }
  }

  const newHash = await hashPassword(newPass);
  USERS[targetUser].passHash = newHash;
  savePasswordHash(targetUser, newHash);
  document.getElementById('chpass-overlay').remove();
  showToast(`✓ Ο κωδικός του ${targetUser} άλλαξε`);
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-'+page);
  if (navEl) navEl.classList.add('active');
  const mc = document.getElementById('main-content');

  if (page === 'dashboard') renderDashboard(mc);
  else if (page === 'detectors') renderDetectors(mc);
  else if (page === 'detector-detail') renderDetectorDetail(mc);
  else if (page === 'add') renderAdd(mc);
  else if (page === 'stats') renderStats(mc);
  else if (page === 'admin') renderAdmin(mc);

  mc.scrollTop = 0;
}

    renderDetectorDetail(document.getElementById('main-content'));

}

function setDetNextDate(tag, val) {
  const det = DETECTORS.find(d => d.tag === tag);
  if (det) {
    det.nextCalDate = val;
    gsUpdateDetector({ tag, nextCalDate: val });
    renderDetectorDetail(document.getElementById('main-content'));

}

    return;
  }

  let taskStr = selectedTasks.map(t => t === 'Άλλο' && altro ? altro : t).join(' | ');

  let det = DETECTORS.find(d => d.tag === tag);
  if (!det) {
    det = { tag, area: getArea(tag), type: 'GAS', entries: [] };
    DETECTORS.push(det);
  }
  det.entries.push({ date, task: taskStr, tech, cylinder: cyl, notes });

  // Save to localStorage
  saveDetectors();

  // Save to Google Sheets
  gsSaveEntry({
    tag, date, task: taskStr, cylinder: cyl, tech, notes,
    calInterval: getIntervalMonths(det),
  });

  // Auto-update next cal date if Βαθμονόμηση
  if (taskStr.includes('Βαθμονόμηση')) {
    const interval = getIntervalMonths(det);
    const nextDate = new Date(date);
    nextDate.setMonth(nextDate.getMonth() + interval);
    det.nextCalDate = nextDate.toISOString().split('T')[0];
    gsUpdateDetector({ tag, nextCalDate: det.nextCalDate });
  }

  selectedTasks = [];
  selectedDetector = det;
  showToast(t('saved'));
  setTimeout(() => showPage('detector-detail'), 800);
}

// ══ STATS ══
function renderStats(mc) {
  const taskCount = {};
  TASK_OPTIONS.forEach(t => taskCount[t] = 0);
  taskCount['Άλλο/Σύνθετο'] = 0;
  let total = 0;

  DETECTORS.forEach(d => d.entries.forEach(e => {
    total++;
    const tasks = e.task.split('|').map(s=>s.trim());
    tasks.forEach(task => {
      const found = TASK_OPTIONS.find(o => task.includes(o));
      if (found) taskCount[found] = (taskCount[found]||0) + 1;
      else taskCount['Άλλο/Σύνθετο'] = (taskCount['Άλλο/Σύνθετο']||0) + 1;
    });
  }));

  const areaStats = {};
  DETECTORS.forEach(d => {
    if (!areaStats[d.area]) areaStats[d.area] = {total:0,done:0};
    areaStats[d.area].total++;
    if (d.entries.length>0) areaStats[d.area].done++;
  });

  const maxTask = Math.max(...Object.values(taskCount), 1);
  const taskColors = {
    'Βαθμονόμηση':      '#1a5fa8',
    'Αλλαγή αισθητήρα': '#c0251e',
    'Αλλαγή κάρτας':    '#5a3a8a',
    'Αλλαγή καλωδίου':  '#7a5800',
    'Άλλο':             '#1a7a88',
    'Άλλο/Σύνθετο':     '#1a7a88',
  };

  mc.innerHTML = `
    <div class="page-header">
      <div class="page-title">${t('stats-title')}</div>
      <div class="page-sub">${t('stats-sub')} · ${total} εγγραφές</div>
    </div>
    <div class="card">
      <div class="card-title">ΤΥΠΟΣ ΕΡΓΑΣΙΑΣ</div>
      <div class="bar-chart-wrap">
        ${Object.entries(taskCount).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([label,count]) => `
          <div class="bar-row">
            <div class="bar-label">${label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxTask*100)}%;background:${taskColors[label]||'var(--accent)'};"></div></div>
            <div class="bar-count">${count}</div>
          </div>
        `).join('')}
        ${total === 0 ? `<div class="empty-state"><div class="empty-text">Δεν υπάρχουν δεδομένα</div></div>` : ''}
      </div>
    </div>
    <div class="card">
      <div class="card-title">ΚΑΛΥΨΗ ΑΝΑ ΠΕΡΙΟΧΗ</div>
      ${Object.entries(areaStats).sort((a,b)=>b[1].total-a[1].total).map(([area,s]) => `
        <div class="bar-row">
          <div class="bar-label">${area}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(s.done/s.total*100)}%;background:var(--green);"></div></div>
          <div class="bar-count" style="color:var(--green2)">${Math.round(s.done/s.total*100)}%</div>
        </div>
      `).join('')}
    </div>
    <div class="card">
      <div class="card-title">ΣΥΝΟΨΗ</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div style="background:var(--bg3);border-radius:8px;padding:12px">

function showListManager(listType) {
  const labels  = { type: 'Τύποι Ανιχνευτών', area: 'Περιοχές' };
  const getList = () => listType === 'type' ? DET_TYPES : DET_AREAS;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = 'listmgr-overlay';

  const renderItems = () => {
    const list = getList();
    return list.map((item, i) => `
      <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="flex:1;font-size:13px;font-family:var(--cond);font-weight:600">${item}</span>
        <button onclick="removeListItem('${listType}',${i})"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--red2);padding:3px 8px;cursor:pointer;font-size:12px">✕</button>
      </div>
    `).join('');
  };

  overlay.innerHTML = `
    <div class="modal-box" style="text-align:left;max-height:80vh;overflow-y:auto">
      <div class="modal-title" style="margin-bottom:16px">📋 ${labels[listType]}</div>
      <div id="listmgr-items">${renderItems()}</div>
      <button onclick="addListItem('${listType}')"
        style="margin-top:12px;width:100%;background:var(--bg3);border:1px dashed var(--border2);border-radius:var(--radius);color:var(--accent);padding:8px;font-family:var(--cond);font-weight:600;font-size:13px;cursor:pointer">
        + Προσθήκη
      </button>
      <button class="modal-cancel" style="width:100%;margin-top:8px" onclick="document.getElementById('listmgr-overlay').remove()">Κλείσιμο</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

function removeListItem(listType, index) {
  if (listType === 'type')     { DET_TYPES.splice(index, 1); }
  else if (listType === 'area') { DET_AREAS.splice(index, 1); }
  saveLists();
  // Refresh manager
  document.getElementById('listmgr-overlay')?.remove();
  showListManager(listType);
  showToast('Αφαιρέθηκε');
}

function updateInterval(cat, val) {
  if (!DET_CATEGORIES.includes(cat)) DET_CATEGORIES.push(cat);
  saveLists();
  showToast(`Interval για "${cat}": ${val} μήνες`);
}

// Προσθήκη νέας τιμής σε λίστα (Τύπος / Περιοχή / Κατηγορία)
function addListItem(listType) {
  const labels = { type: 'Τύπος ανιχνευτή', area: 'Περιοχή', category: 'Κατηγορία' };
  const placeholders = { type: 'π.χ. OXYGEN DETECTOR', area: 'π.χ. ΛΙΜΑΝΙ', category: 'π.χ. ΟΞΥΓΟΝΟ' };

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = 'addlist-overlay';
  overlay.innerHTML = `
    <div class="modal-box" style="text-align:left">
      <div class="modal-title" style="margin-bottom:12px">➕ Νέο: ${labels[listType]}</div>
      <label class="field-label">ΤΙΜΗ</label>
      <input type="text" class="field-input" id="addlist-val"
        placeholder="${placeholders[listType]}" style="margin-bottom:${listType==='category'?'10px':'16px'}">
      ${listType === 'category' ? `
      <label class="field-label">INTERVAL ΒΑΘΜΟΝΟΜΗΣΗΣ</label>
      <select class="field-input" id="addlist-interval" style="margin-bottom:16px">
        <option value="2">2 μήνες</option>
        <option value="4">4 μήνες</option>
        <option value="6" selected>6 μήνες</option>
        <option value="12">12 μήνες</option>
      </select>` : ''}
      <div style="display:flex;gap:8px">
        <button class="modal-cancel" onclick="document.getElementById('addlist-overlay').remove()">Ακύρωση</button>
        <button class="modal-ok" onclick="confirmAddListItem('${listType}')">ΠΡΟΣΘΗΚΗ</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('addlist-val')?.focus(), 100);
}

function confirmAddListItem(listType) {
  const val = document.getElementById('addlist-val')?.value.trim().toUpperCase();
  if (!val) { showToast('Συμπλήρωσε τιμή','error'); return; }

  if (listType === 'type') {
    if (!DET_TYPES.includes(val)) { DET_TYPES.push(val); saveLists(); }
  } else if (listType === 'area') {
    if (!DET_AREAS.includes(val)) { DET_AREAS.push(val); saveLists(); }
  } else if (listType === 'category') {
    const interval = parseInt(document.getElementById('addlist-interval')?.value || '6');
    if (!DET_CATEGORIES.includes(val)) { DET_CATEGORIES.push(val); }
    CAL_INTERVALS[val] = interval;
    saveLists();
  }

  document.getElementById('addlist-overlay').remove();
  showToast(`✓ Προστέθηκε: ${val}`);

  // Refresh new detector modal if open
  const ndOverlay = document.getElementById('newdet-overlay');
  if (ndOverlay) {
    ndOverlay.remove();
    showNewDetectorModal();
  }
  // Refresh admin if open
  if (currentPage === 'admin') renderAdmin(document.getElementById('main-content'));
}

function submitNewDetector() {
  const tag      = document.getElementById('nd-tag').value.trim().toUpperCase();
  const desc     = document.getElementById('nd-desc').value.trim();
  const loc      = document.getElementById('nd-loc').value.trim();
  const type     = document.getElementById('nd-type').value;
  const area     = document.getElementById('nd-area').value;
  const cat      = document.getElementById('nd-cat').value;
  const interval = document.getElementById('nd-interval').value;
  const nextCal  = document.getElementById('nd-nextcal').value;
  const errEl    = document.getElementById('nd-error');

  if (!tag) { errEl.textContent='Το TAG είναι υποχρεωτικό'; errEl.style.display='block'; return; }
  if (DETECTORS.find(d=>d.tag===tag)) {
    errEl.textContent=`Ο ανιχνευτής ${tag} υπάρχει ήδη`; errEl.style.display='block'; return;
  }

  DETECTORS.push({
    tag, description: desc, location: loc, type, area,
    category: cat, calInterval: interval ? parseInt(interval) : null,
    nextCalDate: nextCal || null, entries: []
  });

  // Save to Google Sheets
  gsSaveDetector({ tag, description: desc, location: loc, type, area,
    category: cat, calInterval: interval || '', nextCalDate: nextCal || '' });

  // Save to localStorage
  saveDetectors();

  document.getElementById('newdet-overlay').remove();
  showToast(`✓ Ανιχνευτής ${tag} προστέθηκε`);
  // Open the new detector
  selectedDetector = DETECTORS[DETECTORS.length-1];
  showPage('detector-detail');
}

function exportMonthly(format) {
  const mo = document.getElementById('mo-month')?.value;
  if (!mo) { showToast('Επίλεξε μήνα','error'); return; }
  const [year, month] = mo.split('-').map(Number);
  document.getElementById('monthly-overlay')?.remove();

  // Collect all entries for that month
  const monthEntries = [];
  DETECTORS.forEach(d => {
    d.entries.forEach(e => {
      const [ey, em] = e.date.split('-').map(Number);
      if (ey === year && em === month) {
        monthEntries.push({
          tag: d.tag,
          description: d.description || d.location || d.area,
          date: e.date,
          task: e.task,
          tech: e.tech,
          cylinder: e.cylinder || '',
          notes: e.notes || '',
        });
      }
    });
  });

  monthEntries.sort((a,b) => a.date.localeCompare(b.date));

  const monthNames = ['','Ιανουαρίου','Φεβρουαρίου','Μαρτίου','Απριλίου','Μαΐου','Ιουνίου',
    'Ιουλίου','Αυγούστου','Σεπτεμβρίου','Οκτωβρίου','Νοεμβρίου','Δεκεμβρίου'];
  const monthLabel = `${monthNames[month]} ${year}`;

  if (format === 'pdf') exportMonthlyPDF(monthEntries, monthLabel, month, year);
  else exportMonthlyExcel(monthEntries, monthLabel, month, year);
}

function exportMonthlyExcel(entries, monthLabel, month, year) {
  // Build CSV (opens in Excel)
  const BOM = '\uFEFF'; // UTF-8 BOM for Greek characters in Excel
  const headers = ['TAG','ΠΕΡΙΓΡΑΦΗ / ΤΟΠΟΘΕΣΙΑ','ΗΜΕΡΟΜΗΝΙΑ','ΤΥΠΟΣ ΕΡΓΑΣΙΑΣ','ΦΙΑΛΗ','ΤΕΧΝΙΤΗΣ','ΣΗΜΕΙΩΣΕΙΣ'];
  const rows = entries.map(e => [
    e.tag,
    `"${(e.description||'').replace(/"/g,'""')}"`,
    e.date,
    `"${(e.task||'').replace(/"/g,'""')}"`,
    e.cylinder || '',
    `"${(e.tech||'').replace(/"/g,'""')}"`,
    `"${(e.notes||'').replace(/"/g,'""')}"`,
  ]);

  const csv = BOM + [
    `MOTOR OIL REFINERIES - INSTRUMENTATION DEPT`,
    `ΜΗΝΙΑΙΑ ΑΝΑΦΟΡΑ ΕΡΓΑΣΙΩΝ ΑΝΙΧΝΕΥΤΩΝ - ${monthLabel.toUpperCase()}`,
    `Εξαγωγή: ${new Date().toLocaleDateString('el-GR')}`,
    `Σύνολο εγγραφών: ${entries.length}`,
    '',
    headers.join(';'),
    ...rows.map(r => r.join(';')),
    '',
    `Σύνολο εργασιών;${entries.length}`,
    `Βαθμονομήσεις;${entries.filter(e=>e.task.includes('Βαθμονόμηση')).length}`,
    `Αλλαγές;${entries.filter(e=>e.task.includes('Αλλαγή')).length}`,
  ].join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `DETECTORS_${year}_${String(month).padStart(2,'0')}_${monthLabel.replace(' ','_')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✓ Excel αποθηκεύτηκε`);
}

  .header-sub { font-size: 11px; color: #aaa; margin-top: 3px; }
  .header-date { font-size: 10px; color: #888; }
  .kpi-row { display:flex; gap:12px; padding: 0 20px 14px; }
  .kpi { flex:1; background:#f5f5f3; border-left:3px solid #ff7a2a; padding:8px 10px; border-radius:3px; }
  .kpi-val { font-size:20px; font-weight:700; color:#1c1f1a; }
  .kpi-lbl { font-size:9px; color:#888; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }
  .kpi.red   { border-color: #e04840; }
  .kpi.green { border-color: #5cb87a; }
  .kpi.blue  { border-color: #5ab4d4; }
  .section { padding: 0 20px 20px; }
  .section-title { font-size: 12px; font-weight:700; color:#ff7a2a; letter-spacing:1px; text-transform:uppercase; border-bottom:2px solid #ff7a2a; padding-bottom:4px; margin-bottom:10px; }
  table { width:100%; border-collapse:collapse; }
  th { background:#1c1f1a; color:#ff7a2a; font-size:9px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; padding:7px 8px; text-align:left; }
  td { padding:6px 8px; border-bottom:1px solid #e8e8e8; vertical-align:top; font-size:10px; }
  tr:nth-child(even) td { background:#f9f9f7; }
  tr:hover td { background:#fff3e8; }
  .tag { font-family:monospace; font-weight:700; color:#1c1f1a; }
  .overdue { color:#e04840; font-weight:700; }
  .soon { color:#ff7a2a; font-weight:600; }
  .ok { color:#5cb87a; }
  .footer { position:fixed; bottom:0; left:0; right:0; text-align:center; font-size:9px; color:#bbb; padding:6px; border-top:1px solid #eee; background:#fff; }
  @media print {
    .no-print { display:none!important; }
    body { font-size: 10px; }
    .header { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    th { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">🔥 ${title}</div>
      <div class="header-sub">${subtitle}</div>
    </div>
    <div class="header-date">${new Date().toLocaleDateString('el-GR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
  </div>
</div>
${mode !== 'detector' ? `
<div class="kpi-row">
  <div class="kpi"><div class="kpi-val">${DETECTORS.length}</div><div class="kpi-lbl">Σύνολο</div></div>
  <div class="kpi red"><div class="kpi-val">${alertCounts.overdue}</div><div class="kpi-lbl">Ληγμένοι</div></div>
  <div class="kpi" style="border-color:#ff7a2a"><div class="kpi-val">${alertCounts.soon}</div><div class="kpi-lbl">≤30 μέρες</div></div>
  <div class="kpi green"><div class="kpi-val">${alertCounts.ok}</div><div class="kpi-lbl">Εντός</div></div>
</div>` : ''}
<div class="section">
  <div class="section-title">${mode==='detector' ? 'Ιστορικό Εγγραφών' : mode==='upcoming' ? 'Επερχόμενες Βαθμονομήσεις' : 'Κατάλογος Ανιχνευτών'}</div>
  <table>
    <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>
      ${rows.map((r,i) => `
        <tr>
          <td class="tag">${r.col1}</td>
          <td>${r.col2}</td>
          <td>${r.col3}</td>
          <td>${r.col4}</td>
          <td class="${r.col5.includes('ΛΗΓΜ')?'overdue':r.col5.includes('μέρ')&&parseInt(r.col5)<31?'soon':''}">${r.col5}</td>
        </tr>
      `).join('')}
    </tbody>
  </table>
  <div style="margin-top:10px;font-size:9px;color:#aaa;text-align:right">${rows.length} εγγραφές</div>
</div>
<div class="footer">Motor Oil Refineries · Instruments Dept · ${new Date().getFullYear()} · Εκτυπώθηκε: ${new Date().toLocaleDateString('el-GR')}</div>
<div class="no-print" style="text-align:center;padding:20px">
  <button onclick="window.print()" style="background:#ff7a2a;color:#fff;border:none;padding:10px 24px;font-size:14px;font-weight:700;border-radius:6px;cursor:pointer;margin-right:8px">🖨 ΕΚΤΥΠΩΣΗ</button>
  <button onclick="window.close()" style="background:#444;color:#fff;border:none;padding:10px 24px;font-size:14px;border-radius:6px;cursor:pointer">✕ Κλείσιμο</button>
</div>
</body></html>`;

  // Blob URL — πραγματικό νέο tab, κλείσιμο δεν επηρεάζει την εφαρμογή
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const win  = window.open(url, '_blank');
  if (win) {
    win.addEventListener('load', () => {
      setTimeout(() => { URL.revokeObjectURL(url); }, 2000);
    });
  } else {
    showToast('Επίτρεψε τα pop-ups για εκτύπωση', 'error');
  }
}


// ══ KPI LIST MODAL ══
function showKpiList(filter) {
  const labels = {
    all:     { title: 'ΟΛΟΙ ΟΙ ΑΝΙΧΝΕΥΤΕΣ', color: 'var(--accent)',  icon: '📊' },
    overdue: { title: 'ΛΗΓΜΕΝΟΙ ΑΝΙΧΝΕΥΤΕΣ', color: 'var(--red2)',   icon: '⚠️' },
    soon:    { title: 'ΒΑΘΜΟΝΟΜΗΣΗ ≤30 ΜΕΡΕΣ', color: 'var(--accent2)', icon: '⏰' },
    ok:      { title: 'ΕΝΤΟΣ ΠΡΟΓΡΑΜΜΑΤΟΣ',   color: 'var(--green2)', icon: '✅' },
  };
  const lbl = labels[filter];

  const filtered = filter === 'all'
    ? DETECTORS.slice()
    : DETECTORS.filter(d => getAlertStatus(d) === filter);

  filtered.sort((a,b) => {
    if (filter === 'overdue') {
      return (getNextCalDate(a)||'').localeCompare(getNextCalDate(b)||'');
    }
    return (getNextCalDate(a)||'9999').localeCompare(getNextCalDate(b)||'9999');
  });

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = 'kpi-list-overlay';
  overlay.style.cssText = 'align-items:flex-start;padding:0;overflow-y:auto;';

  overlay.innerHTML = `
    <div style="background:var(--bg2);width:100%;min-height:100vh;max-width:680px;margin:0 auto;padding:16px 16px 80px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-top:8px">
        <button onclick="document.getElementById('kpi-list-overlay').remove()"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);padding:6px 12px;cursor:pointer;font-family:var(--font);font-size:14px">
          ← Πίσω
        </button>
        <div>
          <div style="font-family:var(--cond);font-size:18px;font-weight:700;color:${lbl.color}">${lbl.icon} ${lbl.title}</div>
          <div style="font-size:12px;color:var(--text3)">${filtered.length} ανιχνευτές</div>
        </div>
      </div>
      ${filtered.length === 0 ? `
        <div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">Κανένας ανιχνευτής σε αυτή την κατηγορία</div></div>
      ` : filtered.map(d => {
        const status  = getAlertStatus(d);
        const next    = getNextCalDate(d);
        const days    = getDaysUntil(next);
        const alertColor = status==='overdue' ? 'var(--red2)' : status==='soon' ? 'var(--accent2)' : status==='ok' ? 'var(--green2)' : 'var(--text3)';
        const daysText = days === null ? '—' : days < 0 ? Math.abs(days)+'μ πριν' : days === 0 ? 'ΣΗΜΕΡΑ' : days+'μ';
        return `
        <div class="detector-item" onclick="document.getElementById('kpi-list-overlay').remove();openDetector('${d.tag}')" style="margin-bottom:6px">
          <div style="flex:1;min-width:0">
            <div class="det-tag">${d.tag}</div>
            <div class="det-area">${d.location || d.area} · ${d.category||''}</div>
          </div>
          <div style="text-align:right;margin-right:8px">
            <div style="font-family:var(--mono);font-size:11px;color:${alertColor}">${formatDate(next)}</div>
            <div style="font-size:10px;color:${alertColor};font-weight:600">${daysText}</div>
          </div>
          <span class="det-arrow">›</span>
        </div>`;
      }).join('')}
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.scrollTop = 0;
}


// ══ BACKUP / RESTORE ══
function getLastBackupLabel() {
  const ts = localStorage.getItem('vmrtin26_last_backup');
  if (!ts) return 'Κανένα';
  return new Date(ts).toLocaleDateString('el-GR', {
    day:'2-digit', month:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}

function exportBackupJSON() {
  const backup = {
    version:   '1.0',
    timestamp: new Date().toISOString(),
    app:       'VMRTIN26',
    detectors: DETECTORS,
    entries:   DETECTORS.flatMap(d => (d.entries||[]).map(e => ({...e, tag: d.tag}))),
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href     = url;
  a.download = `VMRTIN26_backup_${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem('vmrtin26_last_backup', new Date().toISOString());
  const lbl = document.getElementById('last-backup-label');
  if (lbl) lbl.textContent = getLastBackupLabel();
  showToast('✓ Backup αποθηκεύτηκε: VMRTIN26_backup_' + date + '.json');
}

function importBackupJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.app || backup.app !== 'VMRTIN26') {
        showToast('Μη έγκυρο αρχείο backup VMRTIN26', 'error');
        return;
      }
      // Confirm
      const ts = new Date(backup.timestamp).toLocaleDateString('el-GR', {
        day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
      });
      if (!confirm(`Φόρτωση backup από ${ts}?\n\nΑυτό θα αντικαταστήσει τα τρέχοντα δεδομένα.\n\nΣυνέχεια;`)) {
        input.value = '';
        return;
      }
      // Restore detectors
      DETECTORS.length = 0;
      (backup.detectors || []).forEach(d => DETECTORS.push(d));
      // Restore entries into detectors
      if (backup.entries && backup.entries.length > 0) {
        const entryMap = {};
        backup.entries.forEach(e => {
          if (!entryMap[e.tag]) entryMap[e.tag] = [];
          entryMap[e.tag].push(e);
        });
        DETECTORS.forEach(d => {
          if (entryMap[d.tag]) d.entries = entryMap[d.tag];
        });
      }
      saveDetectors();
      showToast('✓ Backup φορτώθηκε επιτυχώς — ' + DETECTORS.length + ' ανιχνευτές');
      showPage(currentPage || 'home');
    } catch(err) {
      showToast('Σφάλμα ανάγνωσης backup: ' + err.message, 'error');
    }
    input.value = '';
  };
  reader.readAsText(file, 'utf-8');
}

// ══ QR MODAL ══
let qrContext = 'detectors';

function openQR(ctx) {
  qrContext = ctx;
  document.getElementById('qr-modal').classList.add('open');
  document.getElementById('qr-tag-input').value = '';
  document.getElementById('qr-sub').textContent = t('qr-sub');
  setTimeout(() => document.getElementById('qr-tag-input').focus(), 100);
}

function closeQR() {
  document.getElementById('qr-modal').classList.remove('open');
}

function qrConfirm() {
  const tag = document.getElementById('qr-tag-input').value.trim();
  closeQR();
  if (!tag) return;
  if (qrContext === 'detectors') {
    const found = DETECTORS.find(d => d.tag === tag);
    if (found) { openDetector(tag); }
    else { showToast(lang==='el'?`TAG ${tag} δεν βρέθηκε`:`TAG ${tag} not found`, 'error'); }
  } else if (qrContext === 'add') {
    const inp = document.getElementById('add-tag');
    if (inp) inp.value = tag;
  }
}

document.getElementById('qr-tag-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') qrConfirm();
});

// ══ TOAST ══
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
