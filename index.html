function removeListItem(listType, index) {
  if (listType === 'type')     { DET_TYPES.splice(index, 1); }
  else if (listType === 'area') { DET_AREAS.splice(index, 1); }
  saveLists();
  // Refresh manager
  document.getElementById('listmgr-overlay')?.remove();
  showListManager(listType);
  showToast('Αφαιρέθηκε');
}

function updateInterval(cat, val) {
  if (!DET_CATEGORIES.includes(cat)) DET_CATEGORIES.push(cat);
  saveLists();
  showToast(`Interval για "${cat}": ${val} μήνες`);
}

// Προσθήκη νέας τιμής σε λίστα (Τύπος / Περιοχή / Κατηγορία)
// applyToTag (προαιρετικό): αν δοθεί, η νέα τιμή εφαρμόζεται αυτόματα
// σε αυτόν τον ανιχνευτή μετά την προσθήκη (π.χ. όταν προστίθεται από το dropdown της κάρτας).
function addListItem(listType, applyToTag) {
  const labels = { type: 'Τύπος ανιχνευτή', area: 'Περιοχή', category: 'Κατηγορία' };
  const placeholders = { type: 'π.χ. OXYGEN DETECTOR', area: 'π.χ. ΛΙΜΑΝΙ', category: 'π.χ. ΟΞΥΓΟΝΟ' };

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = 'addlist-overlay';
  overlay.dataset.applyToTag = applyToTag || '';
  overlay.innerHTML = `
    <div class="modal-box" style="text-align:left">
      <div class="modal-title" style="margin-bottom:12px">➕ Νέο: ${labels[listType]}</div>
      <label class="field-label">ΤΙΜΗ</label>
      <input type="text" class="field-input" id="addlist-val"
        placeholder="${placeholders[listType]}" style="margin-bottom:${listType==='category'?'10px':'16px'}">
      ${listType === 'category' ? `
      <label class="field-label">INTERVAL ΒΑΘΜΟΝΟΜΗΣΗΣ</label>
      <select class="field-input" id="addlist-interval" style="margin-bottom:16px">
        <option value="2">2 μήνες</option>
        <option value="4">4 μήνες</option>
        <option value="6" selected>6 μήνες</option>
        <option value="12">12 μήνες</option>
      </select>` : ''}
      <div style="display:flex;gap:8px">
        <button class="modal-cancel" onclick="document.getElementById('addlist-overlay').remove()">Ακύρωση</button>
        <button class="modal-ok" onclick="confirmAddListItem('${listType}')">ΠΡΟΣΘΗΚΗ</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('addlist-val')?.focus(), 100);
}

function confirmAddListItem(listType) {
  const val = document.getElementById('addlist-val')?.value.trim().toUpperCase();
  if (!val) { showToast('Συμπλήρωσε τιμή','error'); return; }
  const applyToTag = document.getElementById('addlist-overlay')?.dataset.applyToTag || '';

  if (listType === 'type') {
    if (!DET_TYPES.includes(val)) { DET_TYPES.push(val); saveLists(); }
  } else if (listType === 'area') {
    if (!DET_AREAS.includes(val)) { DET_AREAS.push(val); saveLists(); }
  } else if (listType === 'category') {
    const interval = parseInt(document.getElementById('addlist-interval')?.value || '6');
    if (!DET_CATEGORIES.includes(val)) { DET_CATEGORIES.push(val); }
    CAL_INTERVALS[val] = interval;
    saveLists();
  }

  document.getElementById('addlist-overlay').remove();
  showToast(`✓ Προστέθηκε: ${val}`);

  // Αν προστέθηκε από το dropdown συγκεκριμένου ανιχνευτή, εφαρμόζεται κατευθείαν εκεί
  if (applyToTag) {
    if (listType === 'category') setDetCategory(applyToTag, val);
    else if (listType === 'type') setDetType(applyToTag, val);
    else if (listType === 'area') setDetArea(applyToTag, val);
    return; // οι παρακάτω refresh δεν χρειάζονται, το set* ήδη κάνει re-render
  }

  // Refresh new detector modal if open
  const ndOverlay = document.getElementById('newdet-overlay');
  if (ndOverlay) {
    ndOverlay.remove();
    showNewDetectorModal();
  }
  // Refresh admin if open
  if (currentPage === 'admin') renderAdmin(document.getElementById('main-content'));
}

function changeRole(uname, newRole) {
  USERS[uname].role = newRole;
  if (gsConnected) {
    gsPost({ action: 'saveUser', data: {
      username: uname,
      name:     USERS[uname].name     || uname,
      role:     newRole,
      dept:     USERS[uname].dept     || '',
      passHash: USERS[uname].passHash || '',
    }}).then(() => showToast(`✓ Ρόλος ${uname} → ${newRole} αποθηκεύτηκε`))
      .catch(() => showToast('Αποθηκεύτηκε τοπικά μόνο','error'));
  } else {
    showToast(`Ρόλος ${uname} ενημερώθηκε (offline)`);
  }
}

async function addUser() {
  const uname = document.getElementById('new-uname').value.trim();
  const name  = document.getElementById('new-name').value.trim();
  const pass  = document.getElementById('new-pass').value;
  const role  = document.getElementById('new-role').value;
  if (!uname || !name || !pass) { showToast('Συμπλήρωσε όλα τα πεδία','error'); return; }
  if (USERS[uname]) { showToast('Υπάρχει ήδη αυτό το username','error'); return; }
  const hash = await hashPassword(pass);
  USERS[uname] = { passHash: hash, role, name, dept: '' };
  savePasswordHash(uname, hash);
  if (gsConnected) {
    gsPost({ action: 'saveUser', data: {
      username: uname, name, role, dept: '', passHash: hash
    }}).then(() => showToast(`✓ Χρήστης ${uname} αποθηκεύτηκε στο Sheet`))
      .catch(() => showToast(`✓ Χρήστης ${uname} προστέθηκε (offline)`));
  } else {
    showToast(`✓ Χρήστης ${uname} προστέθηκε (offline)`);
  }
  document.getElementById('new-uname').value = '';
  document.getElementById('new-name').value  = '';
  document.getElementById('new-pass').value  = '';
  renderAdmin(document.getElementById('main-content'));
}


// ══ DELETE USER ══
async function deleteUser(uname) {
  if (uname === 'admin') { showToast('Δεν μπορείς να διαγράψεις τον admin','error'); return; }
  if (uname === currentUser.username) { showToast('Δεν μπορείς να διαγράψεις τον εαυτό σου','error'); return; }
  if (!confirm(`Διαγραφή χρήστη "${uname}";\nΗ ενέργεια είναι μη αναστρέψιμη.`)) return;
  delete USERS[uname];
  localStorage.removeItem('vmrtin26_pw_' + uname);
  // Διαγραφή από Sheet — saveUser με role=DELETED flag
  if (gsConnected) {
    gsPost({ action: 'deleteUser', data: { username: uname } }).catch(()=>{});
  }
  showToast(`✓ Χρήστης ${uname} διαγράφηκε`);
  renderAdmin(document.getElementById('main-content'));
}

function submitNewDetector() {
  const tag      = document.getElementById('nd-tag').value.trim().toUpperCase();
  const desc     = document.getElementById('nd-desc').value.trim();
  const loc      = document.getElementById('nd-loc').value.trim();
  const type     = document.getElementById('nd-type').value;
  const area     = document.getElementById('nd-area').value;
  const cat      = document.getElementById('nd-cat').value;
  const interval = document.getElementById('nd-interval').value;
  const nextCal  = document.getElementById('nd-nextcal__hidden').value;
  const errEl    = document.getElementById('nd-error');

  if (!tag) { errEl.textContent='Το TAG είναι υποχρεωτικό'; errEl.style.display='block'; return; }
  if (DETECTORS.find(d=>d.tag===tag)) {
    errEl.textContent=`Ο ανιχνευτής ${tag} υπάρχει ήδη`; errEl.style.display='block'; return;
  }

  DETECTORS.push({
    tag, description: desc, location: loc, type, area,
    category: cat, calInterval: interval ? parseInt(interval) : null,
    nextCalDate: nextCal || null, entries: []
  });

  // Save to Google Sheets
  gsSaveDetector({ tag, description: desc, location: loc, type, area,
    category: cat, calInterval: interval || '', nextCalDate: nextCal || '' });

  // Save to localStorage
  saveDetectors();

  document.getElementById('newdet-overlay').remove();
  showToast(`✓ Ανιχνευτής ${tag} προστέθηκε`);
  // Open the new detector
  selectedDetector = DETECTORS[DETECTORS.length-1];
  showPage('detector-detail');
}

function exportMonthly(format) {
  const mo = document.getElementById('mo-month')?.value;
  if (!mo) { showToast('Επίλεξε μήνα','error'); return; }
  const [year, month] = mo.split('-').map(Number);
  document.getElementById('monthly-overlay')?.remove();

  // Collect all entries for that month
  const monthEntries = [];
  DETECTORS.forEach(d => {
    d.entries.forEach(e => {
      const [ey, em] = e.date.split('-').map(Number);
      if (ey === year && em === month) {
        monthEntries.push({
          tag: d.tag,
          description: d.description || d.location || d.area,
          date: e.date,
          task: e.task,
          tech: e.tech,
          cylinder: e.cylinder || '',
          notes: e.notes || '',
        });
      }
    });
  });

  monthEntries.sort((a,b) => a.date.localeCompare(b.date));

  const monthNames = ['','Ιανουαρίου','Φεβρουαρίου','Μαρτίου','Απριλίου','Μαΐου','Ιουνίου',
    'Ιουλίου','Αυγούστου','Σεπτεμβρίου','Οκτωβρίου','Νοεμβρίου','Δεκεμβρίου'];
  const monthLabel = `${monthNames[month]} ${year}`;

  if (format === 'pdf') exportMonthlyPDF(monthEntries, monthLabel, month, year);
  else exportMonthlyExcel(monthEntries, monthLabel, month, year);
}

function exportMonthlyExcel(entries, monthLabel, month, year) {
  // Build CSV (opens in Excel)
  const BOM = '\uFEFF'; // UTF-8 BOM for Greek characters in Excel
  const headers = ['TAG','ΠΕΡΙΓΡΑΦΗ / ΤΟΠΟΘΕΣΙΑ','ΗΜΕΡΟΜΗΝΙΑ','ΤΥΠΟΣ ΕΡΓΑΣΙΑΣ','ΦΙΑΛΗ','ΤΕΧΝΙΤΗΣ','ΣΗΜΕΙΩΣΕΙΣ'];
  const rows = entries.map(e => [
    e.tag,
    `"${(e.description||'').replace(/"/g,'""')}"`,
    e.date,
    `"${(e.task||'').replace(/"/g,'""')}"`,
    e.cylinder || '',
    `"${(e.tech||'').replace(/"/g,'""')}"`,
    `"${(e.notes||'').replace(/"/g,'""')}"`,
  ]);

  const csv = BOM + [
    `MOTOR OIL REFINERIES - INSTRUMENTATION DEPT`,
    `ΜΗΝΙΑΙΑ ΑΝΑΦΟΡΑ ΕΡΓΑΣΙΩΝ ΑΝΙΧΝΕΥΤΩΝ - ${monthLabel.toUpperCase()}`,
    `Εξαγωγή: ${new Date().toLocaleDateString('el-GR')}`,
    `Σύνολο εγγραφών: ${entries.length}`,
    '',
    headers.join(';'),
    ...rows.map(r => r.join(';')),
    '',
    `Σύνολο εργασιών;${entries.length}`,
    `Βαθμονομήσεις;${entries.filter(e=>e.task.includes('Βαθμονόμηση')).length}`,
    `Αλλαγές;${entries.filter(e=>e.task.includes('Αλλαγή')).length}`,
  ].join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `DETECTORS_${year}_${String(month).padStart(2,'0')}_${monthLabel.replace(' ','_')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✓ Excel αποθηκεύτηκε`);
}

function showKpiList(filter) {
  const labels = {
    all:     { title: 'ΟΛΟΙ ΟΙ ΑΝΙΧΝΕΥΤΕΣ', color: 'var(--accent)',  icon: '📊' },
    overdue: { title: 'ΛΗΓΜΕΝΟΙ ΑΝΙΧΝΕΥΤΕΣ', color: 'var(--red2)',   icon: '⚠️' },
    soon:    { title: 'ΒΑΘΜΟΝΟΜΗΣΗ ≤30 ΜΕΡΕΣ', color: 'var(--accent2)', icon: '⏰' },
    ok:      { title: 'ΕΝΤΟΣ ΠΡΟΓΡΑΜΜΑΤΟΣ',   color: 'var(--green2)', icon: '✅' },
  };
  const lbl = labels[filter];

  const filtered = filter === 'all'
    ? DETECTORS.slice()
    : DETECTORS.filter(d => getAlertStatus(d) === filter);

  filtered.sort((a,b) => {
    if (filter === 'overdue') {
      return (getNextCalDate(a)||'').localeCompare(getNextCalDate(b)||'');
    }
    return (getNextCalDate(a)||'9999').localeCompare(getNextCalDate(b)||'9999');
  });

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = 'kpi-list-overlay';
  overlay.style.cssText = 'align-items:flex-start;padding:0;overflow-y:auto;';

  overlay.innerHTML = `
    <div style="background:var(--bg2);width:100%;min-height:100vh;max-width:680px;margin:0 auto;padding:16px 16px 80px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-top:8px">
        <button onclick="document.getElementById('kpi-list-overlay').remove()"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);padding:6px 12px;cursor:pointer;font-family:var(--font);font-size:14px">
          ← Πίσω
        </button>
        <div>
          <div style="font-family:var(--cond);font-size:18px;font-weight:700;color:${lbl.color}">${lbl.icon} ${lbl.title}</div>
          <div style="font-size:12px;color:var(--text3)">${filtered.length} ανιχνευτές</div>
        </div>
      </div>
      ${filtered.length === 0 ? `
        <div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">Κανένας ανιχνευτής σε αυτή την κατηγορία</div></div>
      ` : filtered.map(d => {
        const status  = getAlertStatus(d);
        const next    = getNextCalDate(d);
        const days    = getDaysUntil(next);
        const alertColor = status==='overdue' ? 'var(--red2)' : status==='soon' ? 'var(--accent2)' : status==='ok' ? 'var(--green2)' : 'var(--text3)';
        const daysText = days === null ? '—' : days < 0 ? Math.abs(days)+'μ πριν' : days === 0 ? 'ΣΗΜΕΡΑ' : days+'μ';
        return `
        <div class="detector-item" onclick="document.getElementById('kpi-list-overlay').remove();openDetector('${d.tag}')" style="margin-bottom:6px">
          <div style="flex:1;min-width:0">
            <div class="det-tag">${d.tag}</div>
            <div class="det-area">${d.location || d.area} · ${d.category||''}</div>
          </div>
          <div style="text-align:right;margin-right:8px">
            <div style="font-family:var(--mono);font-size:11px;color:${alertColor}">${formatDate(next)}</div>
            <div style="font-size:10px;color:${alertColor};font-weight:600">${daysText}</div>
          </div>
          <span class="det-arrow">›</span>
        </div>`;
      }).join('')}
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.scrollTop = 0;
}

// ══ BACKUP / RESTORE ══
async function triggerManualBackup() {
  if (!gsConnected) { showToast('Δεν υπάρχει σύνδεση με Sheet', 'error'); return; }
  showToast('⏳ Backup σε εξέλιξη...');
  try {
    const res = await gsGet({ action: 'manualBackup' });
    if (res && res.ok) {
      showToast('✓ Backup αποθηκεύτηκε στο VMRTIN26_BACKUP Sheet!');
    } else {
      showToast('Σφάλμα backup: ' + (res.error || 'unknown'), 'error');
    }
  } catch(e) {
    showToast('Σφάλμα σύνδεσης: ' + e.message, 'error');
  }
}

function getLastBackupLabel() {
  const ts = localStorage.getItem('vmrtin26_last_backup');
  if (!ts) return 'Κανένα';
  return new Date(ts).toLocaleDateString('el-GR', {
    day:'2-digit', month:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}

  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href     = url;
  a.download = `VMRTIN26_backup_${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem('vmrtin26_last_backup', new Date().toISOString());
  const lbl = document.getElementById('last-backup-label');
  if (lbl) lbl.textContent = getLastBackupLabel();
  showToast('✓ Backup αποθηκεύτηκε: VMRTIN26_backup_' + date + '.json');
}

function importBackupJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.app || backup.app !== 'VMRTIN26') {
        showToast('Μη έγκυρο αρχείο backup VMRTIN26', 'error');
        return;
      }
      // Confirm
      const ts = new Date(backup.timestamp).toLocaleDateString('el-GR', {
        day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
      });
      if (!confirm(`Φόρτωση backup από ${ts}?\n\nΑυτό θα αντικαταστήσει τα τρέχοντα δεδομένα.\n\nΣυνέχεια;`)) {
        input.value = '';
        return;
      }
      // Restore detectors
      DETECTORS.length = 0;
      (backup.detectors || []).forEach(d => DETECTORS.push(d));
      // Restore entries into detectors
      if (backup.entries && backup.entries.length > 0) {
        const entryMap = {};
        backup.entries.forEach(e => {
          if (!entryMap[e.tag]) entryMap[e.tag] = [];
          entryMap[e.tag].push(e);
        });
        DETECTORS.forEach(d => {
          if (entryMap[d.tag]) d.entries = entryMap[d.tag];
        });
      }
      saveDetectors();
      showToast('✓ Backup φορτώθηκε επιτυχώς — ' + DETECTORS.length + ' ανιχνευτές');
      showPage(currentPage || 'home');
    } catch(err) {
      showToast('Σφάλμα ανάγνωσης backup: ' + err.message, 'error');
    }
    input.value = '';
  };
  reader.readAsText(file, 'utf-8');
}

}
function schedGoToday() {

}

function getDetectorsForSchedMonth(m, y) {
  // Επιστρέφει ανιχνευτές που:
  // (α) έχουν nextCalDate σε αυτόν τον μήνα/έτος, ΚΑΙ/Ή
  // (β) έχουν entry (ελέγχθηκαν) εντός αυτού του μήνα
  // → Έτσι ανιχνευτές που ελέγχθηκαν νωρίτερα (άρα nextCalDate άλλαξε)
  //   εξακολουθούν να εμφανίζονται ως ΕΛΕΓΧΘΗΚΑΝ τον μήνα που έγιναν.
  return DETECTORS.filter(d => {
    // Έλεγξε αν έχει nextCalDate αυτόν τον μήνα
    const nd = getNextCalDate(d);
    const inNextCal = nd ? (() => { const dd = new Date(nd); return dd.getFullYear() === y && dd.getMonth() === m; })() : false;
    // Έλεγξε αν ελέγχθηκε εντός αυτού του μήνα
    const hasEntry = detHasEntryInMonth(d, m, y);
    return inNextCal || hasEntry;
  });
}

function detHasEntryInMonth(d, m, y) {
  // Έχει ο ανιχνευτής εγγραφή εντός αυτού του μήνα;
  return d.entries.some(e => {
    const ed = new Date(e.date);
    return ed.getFullYear() === y && ed.getMonth() === m;
  });
}

function getLastEntryInMonth(d, m, y) {
  return d.entries.filter(e => {
    const ed = new Date(e.date);
    return ed.getFullYear() === y && ed.getMonth() === m;
  }).sort((a,b) => b.date.localeCompare(a.date))[0] || null;
}

function renderSchedule(mc) {

  let dets = getDetectorsForSchedMonth(m, y);

  const total = dets.length;
  const doneList  = dets.filter(d => detHasEntryInMonth(d, m, y));
  const pendList  = dets.filter(d => !detHasEntryInMonth(d, m, y));

          itemHtml += `
            <div class="sched-item ${done ? 'has-entry' : 'no-entry'}" onclick="openDetector('${d.tag}')">
              <div class="sched-num-badge">${idx}</div>

                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

                ${done && lastEntry ? `<div style="font-size:11px;color:var(--green2);margin-top:2px;font-family:var(--mono)">🔧 ${lastEntry.task} · ${lastEntry.tech}</div>` : ''}

            </div>`;
        });

  mc.innerHTML = `
    <div class="page-header">
      <div class="page-title">📅 ΜΗΝΙΑΙΟ ΠΡΟΓΡΑΜΜΑ</div>
      <div class="page-sub">Ανιχνευτές ανά μήνα λήξης</div>

  const usedM = (m !== undefined) ? m : scheduleMonthYear.m;
  const usedY = (y !== undefined) ? y : scheduleMonthYear.y;

function exportSchedulePDF(m, y, pdfFilter) {
  const { m: cm, y: cy } = scheduleMonthYear;
  const usedM = (m !== undefined) ? m : cm;
  const usedY = (y !== undefined) ? y : cy;
  const allDets = getDetectorsForSchedMonth(usedM, usedY);
  const monthLabel = MONTH_NAMES_FULL[usedM] + ' ' + usedY;

  const doneCount = allDets.filter(d => detHasEntryInMonth(d, usedM, usedY)).length;
  const pendCount = allDets.length - doneCount;

  // Φίλτρο PDF
  const usedFilter = pdfFilter || 'all';
  const dets = usedFilter === 'done' ? allDets.filter(d =>  detHasEntryInMonth(d, usedM, usedY))
             : usedFilter === 'pend' ? allDets.filter(d => !detHasEntryInMonth(d, usedM, usedY))
             : allDets;

  const filterLabel = usedFilter === 'done' ? ' · ΕΛΕΓΧΘΗΚΑΝ ΜΟΝΟ'
                    : usedFilter === 'pend' ? ' · ΕΚΚΡΕΜΟΥΝ ΜΟΝΟ' : '';

  const rows = dets.map((d, i) => {
    const done = detHasEntryInMonth(d, usedM, usedY);
    const lastEntry = getLastEntryInMonth(d, usedM, usedY);
    const nd = getNextCalDate(d);
    return `<tr>
      <td style="text-align:center;color:#888;font-size:11px">${i+1}</td>
      <td style="font-family:monospace;font-size:12px;color:#1a5fa8;font-weight:700">${d.tag}</td>
      <td style="font-size:11px">${d.location || d.area || '—'}</td>
      <td style="text-align:center;font-size:10px;color:#666">${d.type || '—'}</td>
      <td style="text-align:center;font-family:monospace;font-size:11px">${nd ? formatDate(nd) : '—'}</td>
      <td style="text-align:center">
        <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;
          background:${done?'#e8fde8':'#fde8e8'};color:${done?'#1a6a2a':'#8a1010'}">
          ${done ? '✓ ΕΓΙΝΕ' : '⏳ ΕΚΚΡΕΜΕΙ'}
        </span>
      </td>
      <td style="font-size:10px;color:#555">${lastEntry ? lastEntry.tech : '—'}</td>
      <td style="font-size:10px;color:#555">${lastEntry ? lastEntry.task : '—'}</td>
    </tr>`;

function isExpired(dateStr) {
  const parts = parseDateParts(dateStr);
  if (!parts) return false;
  // new Date(year, monthIndex, day) στο LOCAL timezone — συνεπές με "new Date()"
  // χωρίς ώρα/ζώνη οπουδήποτε αλλού στην εφαρμογή, άρα καμία ολίσθηση εδώ.
  const d = new Date(parts.year, parts.month - 1, parts.day);
  const today = new Date();
  today.setHours(0,0,0,0);
  return d < today;
}

function toggleCylStatus(id) {
  const idx = CYLINDERS.findIndex(c => String(c.id) === String(id));
  if (idx < 0) return;
  const prev = CYLINDERS[idx].status || 'ΕΝΕΡΓΗ';
  CYLINDERS[idx].status = prev === 'ΑΔΕΙΑ' ? 'ΕΝΕΡΓΗ' : 'ΑΔΕΙΑ';
  saveCylinders();
  gsSaveCylinder(CYLINDERS[idx]);
  showToast('✓ Κατάσταση → ' + CYLINDERS[idx].status);
  renderCylinders(document.getElementById('main-content'));
}

async function saveCylinder(monthKey) {
  const cylNo   = document.getElementById('cyl-no').value.trim();
  const gas     = document.getElementById('cyl-gas').value.trim();
  if (!cylNo || !gas) { showToast('Συμπλήρωσε φιάλη και αέριο','error'); return; }
  const cyl = {
    id:       Date.now().toString(),
    monthKey,
    num:      parseInt(document.getElementById('cyl-num').value) || getNextCylNum(monthKey),
    cylNo,
    company:  document.getElementById('cyl-company').value.trim(),
    gas,
    expDate:  document.getElementById('cyl-exp').value.trim(),
    status:   document.getElementById('cyl-status').value,
  };
  CYLINDERS.push(cyl);
  saveCylinders();
  document.getElementById('cyl-add-overlay').remove();
  showToast('💾 Αποθήκευση φιάλης...');
  const ok = await gsSaveCylinder(cyl);
  if (ok) showToast('✓ Φιάλη ' + cyl.num + ' αποθηκεύτηκε στο Sheet');
  renderCylinders(document.getElementById('main-content'));
}

          style="background:var(--bg3);border:1px solid #cc2222;border-radius:var(--radius);color:#cc2222;padding:10px;font-family:var(--cond);font-weight:700;font-size:12px;cursor:pointer">
          🗑 ΔΙΑΓΡΑΦΗ
        </button>
        <button id="ecyl-save"
          style="background:var(--accent);border:none;border-radius:var(--radius);color:#fff;padding:10px;font-family:var(--cond);font-weight:700;font-size:12px;cursor:pointer">
          ΑΠΟΘΗΚΕΥΣΗ
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  // Listeners μέσω JS — όχι onclick attributes — για να αποφύγουμε
  // οποιοδήποτε quoting/scoping πρόβλημα με το id της φιάλης.
  document.getElementById('ecyl-cancel').addEventListener('click', () => overlay.remove());
  document.getElementById('ecyl-delete').addEventListener('click', () => deleteCylinder(id));
  document.getElementById('ecyl-save').addEventListener('click', () => updateCylinder(id));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

function updateCylinder(id) {
  const idx = CYLINDERS.findIndex(c => String(c.id) === String(id));
  if (idx < 0) return;
  CYLINDERS[idx].cylNo   = document.getElementById('ecyl-no').value.trim();
  CYLINDERS[idx].company = document.getElementById('ecyl-company').value.trim();
  CYLINDERS[idx].gas     = document.getElementById('ecyl-gas').value.trim();
  CYLINDERS[idx].expDate = document.getElementById('ecyl-exp').value.trim();
  CYLINDERS[idx].status  = document.getElementById('ecyl-status').value;
  saveCylinders();
  gsSaveCylinder(CYLINDERS[idx]);
  document.getElementById('cyl-edit-overlay').remove();
  showToast('✓ Φιάλη ενημερώθηκε');
  renderCylinders(document.getElementById('main-content'));
}

function deleteCylinder(id) {
  const overlay = document.getElementById('cyl-edit-overlay');
  if (!overlay) return;
  // Αποθηκεύουμε το id στο dataset του overlay — έτσι αποφεύγουμε
  // το interpolation μέσα σε onclick strings που μπορεί να σπάσει.
  overlay.dataset.pendingDeleteId = id;
  const box = overlay.querySelector('.modal-box');
  if (!box) return;
  box.innerHTML = `
    <div class="modal-title" style="color:var(--red2);margin-bottom:12px">🗑 ΔΙΑΓΡΑΦΗ ΦΙΑΛΗΣ</div>
    <p style="color:var(--text2);font-size:14px;margin:0 0 20px">Είσαι σίγουρος;<br>Η ενέργεια είναι μη αναστρέψιμη.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button id="cyl-del-cancel"
        style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);padding:10px;font-family:var(--cond);font-weight:700;font-size:13px;cursor:pointer">
        ΑΚΥΡΩΣΗ
      </button>
      <button id="cyl-del-confirm"
        style="background:#cc2222;border:none;border-radius:var(--radius);color:#fff;padding:10px;font-family:var(--cond);font-weight:700;font-size:13px;cursor:pointer">
        ΝΑΙ, ΔΙΑΓΡΑΦΗ
      </button>
    </div>
  `;
  // Attach listeners μέσω JS — όχι onclick attributes — για να αποφύγουμε
  // οποιοδήποτε quoting/scoping πρόβλημα.
  document.getElementById('cyl-del-cancel').addEventListener('click', () => {
    document.getElementById('cyl-edit-overlay')?.remove();
  });
  document.getElementById('cyl-del-confirm').addEventListener('click', () => {
    const pendingId = document.getElementById('cyl-edit-overlay')?.dataset.pendingDeleteId;
    if (pendingId) _confirmDeleteCylinder(pendingId);
  });
}

function _confirmDeleteCylinder(id) {
  const sid = String(id);
  CYLINDERS = CYLINDERS.filter(c => String(c.id) !== sid);
  saveCylinders();
  if (!DELETED_CYL_IDS.includes(sid)) DELETED_CYL_IDS.push(sid);
  saveDeletedCylIds();
  gsDeleteCylinder(sid).then(ok => {
    if (ok) {
      DELETED_CYL_IDS = DELETED_CYL_IDS.filter(x => x !== sid);
      saveDeletedCylIds();
    } else if (gsConnected) {
      showToast('⚠ Η διαγραφή δεν επιβεβαιώθηκε στο Sheet — θα ξαναδοκιμαστεί', 'error');
    }
  });
  document.getElementById('cyl-edit-overlay')?.remove();
  showToast('✓ Φιάλη διαγράφηκε');
  renderCylinders(document.getElementById('main-content'));
}

function showNewMonthModal() {
  const now = new Date();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.innerHTML = `
    <div class="modal-box" style="max-width:320px;width:calc(100% - 32px)">

function selectNewMonth() {
  const val = document.getElementById('new-month-input').value;
  if (!val) return;
  currentCylMonth = val;
  document.querySelector('.modal-overlay')?.remove();
  renderCylinders(document.getElementById('main-content'));
}

// PWA Install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Δείξε κουμπί εγκατάστασης αν υπάρχει
  const btn = document.getElementById('install-btn');
  if (btn) btn.style.display = 'block';
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  showToast('✓ Η εφαρμογή εγκαταστάθηκε επιτυχώς!');
});

async function installPWA() {
  if (!deferredPrompt) {
    showToast('Χρησιμοποίησε το μενού του browser → "Προσθήκη στην αρχική οθόνη"');
    return;
  }
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
}

// ══ QR MODAL ══
let qrContext = 'detectors';

function openQR(ctx) {
  qrContext = ctx;
  document.getElementById('qr-modal').classList.add('open');
  document.getElementById('qr-tag-input').value = '';
  document.getElementById('qr-sub').textContent = t('qr-sub');
  setTimeout(() => document.getElementById('qr-tag-input').focus(), 100);
}

function closeQR() {
  document.getElementById('qr-modal').classList.remove('open');
}

function qrConfirm() {
  const tag = document.getElementById('qr-tag-input').value.trim();
  closeQR();
  if (!tag) return;
  if (qrContext === 'detectors') {
    const found = DETECTORS.find(d => d.tag === tag);
    if (found) { openDetector(tag); }
    else { showToast(lang==='el'?`TAG ${tag} δεν βρέθηκε`:`TAG ${tag} not found`, 'error'); }
  } else if (qrContext === 'add') {
    const inp = document.getElementById('add-tag');
    if (inp) inp.value = tag;
  }
}

document.getElementById('qr-tag-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') qrConfirm();
});

// ══ TOAST ══
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
